<style>
:root {
  --bg:    #0d0f14;
  --bg2:   #13161c;
  --bg3:   #1a1e26;
  --line:  #1e2530;
  --ice:   #60c8ff;
  --ice2:  #90dcff;
  --text:  #e8edf5;
  --muted: #7a8a9e;
  --dim:   #38445a;
  --display: 'Syne', sans-serif;
  --mono:    'Syne Mono', monospace;
  --body:    'Chivo Mono', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--body); min-height: 100vh; overflow-x: hidden;
  position: relative;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(180deg, transparent 0px, transparent 3px, rgba(255,255,255,.008) 3px, rgba(255,255,255,.008) 4px),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 2;
  will-change: transform;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 50% 35% at 0% 100%, rgba(96,200,255,.03) 0%, transparent 70%),
    radial-gradient(ellipse 40% 25% at 100% 0%,  rgba(96,200,255,.02) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 60px;
  background: rgba(13,15,20,.94); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
}
.nav-monogram {
  position: relative; cursor: pointer; user-select: none;
  font-family: var(--display); font-size: 18px; font-weight: 800;
  letter-spacing: -.02em; color: var(--text); padding: 6px 2px;
  transition: color .2s;
}
.nav-monogram:hover { color: var(--ice2); }
.nav-monogram-arrow {
  display: inline-block; margin-left: 5px; font-size: 9px; color: var(--dim);
  transition: transform .25s ease, color .2s; vertical-align: middle; line-height: 1;
}
.nav-monogram.open .nav-monogram-arrow { transform: rotate(180deg); color: var(--muted); }
.nav-dropdown {
  position: absolute; top: calc(100% + 8px); left: 0;
  background: rgba(13,15,20,.97); backdrop-filter: blur(24px);
  border: 1px solid var(--line); border-radius: 10px;
  padding: 8px 0; min-width: 260px;
  opacity: 0; transform: translateY(-8px) scale(.97); pointer-events: none;
  transition: opacity .22s ease, transform .25s cubic-bezier(.16,1,.3,1); z-index: 300;
}
.nav-monogram.open .nav-dropdown {
  opacity: 1; transform: translateY(0) scale(1); pointer-events: all;
}
.nav-dropdown a {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 28px;
  font-family: var(--display); font-size: 17px; font-weight: 800;
  letter-spacing: -.02em;
  color: rgba(232,237,245,.22); text-decoration: none;
  border-left: 2px solid transparent;
  transition: color .18s ease, border-left-color .18s ease, background .18s ease;
  position: relative;
}
.nav-dropdown a:hover { background: rgba(255,255,255,.03); }
.nav-dropdown a:nth-child(1):hover { color: #60c8ff; border-left-color: #60c8ff; }
.nav-dropdown a:nth-child(2):hover { color: #ff64a0; border-left-color: #ff64a0; }
.nav-dropdown a:nth-child(3):hover { color: #a064ff; border-left-color: #a064ff; }
.nav-dropdown a:nth-child(4):hover { color: #3cdcb4; border-left-color: #3cdcb4; }
.nav-dropdown a:nth-child(5):hover { color: #ffc83c; border-left-color: #ffc83c; }
.nav-dropdown a:nth-child(1) { border-bottom: 1px solid var(--line); margin-bottom: 4px; }
.nav-dropdown-num {
  font-family: var(--mono); font-size: 8px; color: var(--dim);
  letter-spacing: .14em; font-weight: 400;
}
.nav-links {
  display: flex; gap: 8px; font-family: var(--display); font-size: 9.5px;
  font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
}
.nav-links a {
  padding: 6px 16px; border-radius: 99px; border: 1px solid var(--line);
  color: var(--dim); text-decoration: none; white-space: nowrap;
  transition: color .25s, border-color .25s, background .25s, box-shadow .25s;
}
.nav-links:hover a { opacity: 0.4; }
.nav-links a:hover { opacity: 1 !important; color: var(--muted); border-color: var(--dim); }
.nav-links a.active { color: var(--text); animation: pill-cycle 8s linear infinite; }
@keyframes pill-cycle {
  0%   { border-color:rgba(96,200,255,.42);  box-shadow:inset 0 1px 0 rgba(96,200,255,.12), 0 0 14px rgba(96,200,255,.14);  background:rgba(96,200,255,.10); }
  14%  { border-color:rgba(160,100,255,.42); box-shadow:inset 0 1px 0 rgba(160,100,255,.12),0 0 14px rgba(160,100,255,.14); background:rgba(160,100,255,.10); }
  28%  { border-color:rgba(255,100,160,.42); box-shadow:inset 0 1px 0 rgba(255,100,160,.12),0 0 14px rgba(255,100,160,.14); background:rgba(255,100,160,.10); }
  42%  { border-color:rgba(60,220,180,.42);  box-shadow:inset 0 1px 0 rgba(60,220,180,.12), 0 0 14px rgba(60,220,180,.14);  background:rgba(60,220,180,.10); }
  56%  { border-color:rgba(255,200,60,.42);  box-shadow:inset 0 1px 0 rgba(255,200,60,.12), 0 0 14px rgba(255,200,60,.14);  background:rgba(255,200,60,.10); }
  70%  { border-color:rgba(255,140,80,.42);  box-shadow:inset 0 1px 0 rgba(255,140,80,.12), 0 0 14px rgba(255,140,80,.14);  background:rgba(255,140,80,.10); }
  84%  { border-color:rgba(80,220,255,.42);  box-shadow:inset 0 1px 0 rgba(80,220,255,.12), 0 0 14px rgba(80,220,255,.14);  background:rgba(80,220,255,.10); }
  100% { border-color:rgba(96,200,255,.42);  box-shadow:inset 0 1px 0 rgba(96,200,255,.12), 0 0 14px rgba(96,200,255,.14);  background:rgba(96,200,255,.10); }
}
.nav-links a:hover { opacity: 1 !important; }
.nav-status { display: none; }
.nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: dotpulse 2.2s ease-in-out infinite; }
@keyframes dotpulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

/* PAGE HEADER */
.page-header {
  padding: 120px 48px 56px;
  border-bottom: 1px solid var(--line);
  position: relative; z-index: 3;
  transition: opacity .25s ease, max-height .35s ease;
  overflow: hidden;
}
.page-header.hidden {
  opacity: 0; max-height: 0;
  padding-top: 0; padding-bottom: 0;
  border-bottom-color: transparent;
  pointer-events: none;
}
.page-eyebrow {
  font-family: var(--mono); font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.page-eyebrow::before { content: ''; display: inline-block; width: 32px; height: 1px; background: var(--dim); opacity: .8; }
.page-title {
  font-family: var(--display); font-size: clamp(48px, 7vw, 96px);
  font-weight: 800; letter-spacing: -.04em; line-height: .9;
  color: var(--text);
  text-shadow: 0 0 80px rgba(255,140,80,.1), 0 2px 40px rgba(0,0,0,.5);
}
.page-sub { font-family: var(--body); font-size: 12px; color: var(--muted); margin-top: 24px; letter-spacing: .04em; }
.page-desc { font-family: var(--body); font-size: 13px; color: var(--muted); line-height: 1.85; max-width: 560px; margin-top: 20px; letter-spacing: .02em; }
.page-desc:empty { display: none; }

/* ── ALBUM LANDING VIEW ── */
#albumLanding { position: relative; z-index: 3; }
.albums-wrap { padding: 48px 48px 160px; }
.albums-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
  gap: 24px;
}
.album-card {
  cursor: pointer; position: relative;
  background: var(--bg2); overflow: hidden;
  transition: transform .4s cubic-bezier(.16,1,.3,1);
}
.album-card:hover { transform: translateY(-3px); }
.album-cover-wrap {
  position: relative; width: 100%;
  padding-top: 72%; /* slightly taller crop for drama */
  overflow: hidden; background: #000;
}
.album-cover-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  transition: opacity 1.2s ease;
}
.album-cover-img.behind { opacity: 0; }
.album-info {
  padding: 16px 18px 18px;
  border-top: 1px solid var(--line);
}
.album-title {
  font-family: var(--display); font-size: 15px; font-weight: 800;
  letter-spacing: -.02em; color: var(--text); margin-bottom: 6px;
}
.album-meta {
  font-family: var(--mono); font-size: 9px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--dim);
  display: flex; justify-content: space-between; align-items: center;
}
.album-count { color: var(--dim); }

/* ── ALBUM DETAIL VIEW ── */
#albumDetail { display: none; position: relative; z-index: 3; }
.album-detail-header {
  padding: 80px 48px 40px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
}
.album-back {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 9px; letter-spacing: .16em;
  text-transform: uppercase; color: var(--dim);
  cursor: pointer; transition: color .2s;
  padding: 10px 16px 10px 10px;
  margin-left: -10px;
  background: none; border: none;
  border-radius: 6px;
}
.album-back:hover { color: var(--muted); background: rgba(255,255,255,.04); }
.album-back svg { width: 12px; height: 12px; }

/* Sticky floating back link */
.sticky-back {
  position: fixed; top: 72px; left: 24px; z-index: 100;
  display: flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 9px; letter-spacing: .16em;
  text-transform: uppercase; color: var(--dim);
  cursor: pointer; background: rgba(13,15,20,.88);
  backdrop-filter: blur(12px); border: 1px solid var(--line);
  border-radius: 99px; padding: 8px 16px 8px 12px;
  transition: opacity .25s ease, color .2s, background .2s;
  opacity: 0; pointer-events: none;
}
.sticky-back.visible { opacity: 1; pointer-events: all; }
.sticky-back:hover { color: var(--muted); background: rgba(30,37,48,.95); }
.sticky-back svg { width: 11px; height: 11px; }
.album-detail-title {
  font-family: var(--display); font-size: clamp(32px, 5vw, 64px);
  font-weight: 800; letter-spacing: -.03em; color: var(--text); line-height: .95;
}
.album-detail-meta {
  font-family: var(--mono); font-size: 9px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--dim); margin-top: 12px;
}
.album-detail-count {
  font-family: var(--mono); font-size: 11px; color: var(--dim);
  letter-spacing: .06em; white-space: nowrap; padding-bottom: 6px;
}

/* ── PHOTO GRID — CSS columns for natural image heights (masonry) ── */
.grid-wrap { padding: 32px 48px 160px; }
.photo-grid {
  columns: 3;
  column-gap: 12px;
}
@media (max-width: 1100px) { .photo-grid { columns: 2; } }
@media (max-width: 600px)  { .photo-grid { columns: 1; } }

.photo-item {
  break-inside: avoid;
  margin-bottom: 12px;
  cursor: pointer; position: relative;
  overflow: hidden; background: #111;
  z-index: 3;
}
.photo-item-inner {
  position: relative; width: 100%;
}
.photo-item-inner::before {
  content: ''; display: block;
  padding-top: var(--aspect-pad, 75%);
}
.photo-item img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .5s cubic-bezier(.25,.46,.45,.94);
}
.photo-item:hover img { transform: scale(1.03); }
.photo-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 32px 14px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,.65));
  opacity: 0; transition: opacity .3s;
}
.photo-item:hover .photo-overlay { opacity: 1; }
.photo-meta-date { font-family: var(--mono); font-size: 8px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.55); margin-bottom: 3px; }
.photo-meta-loc  { font-family: var(--display); font-size: 11px; font-weight: 700; color: rgba(255,255,255,.9); letter-spacing: -.01em; }

/* ── LIGHTBOX ── */
.lightbox-backdrop {
  position: fixed; inset: 0; z-index: 10000;
  background: rgba(5,6,9,.96); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s ease;
}
.lightbox-backdrop.open { opacity: 1; pointer-events: all; }
.lightbox-frame {
  display: inline-flex; flex-direction: column;
  max-width: 92vw; max-height: 92vh;
  background: #fff; overflow: hidden;
}
.lightbox-img-wrap {
  flex: 1; min-height: 0;
  display: flex; align-items: center; justify-content: center;
  background: #000; position: relative;
}
.lightbox-img-wrap img {
  display: block;
  max-width: 92vw;
  max-height: calc(92vh - 60px);
  width: auto; height: auto;
}
.lightbox-bar {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: #fff; border-top: 1px solid #e8e8e8;
  gap: 16px;
}
.lightbox-meta { flex: 1; min-width: 0; }
.lightbox-meta-date { font-family: var(--mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: #888; margin-bottom: 3px; }
.lightbox-meta-loc  { font-family: var(--display); font-size: 14px; font-weight: 700; color: #111; letter-spacing: -.01em; }
.lightbox-counter { font-family: var(--mono); font-size: 10px; color: #aaa; letter-spacing: .1em; white-space: nowrap; }
.lightbox-controls { display: flex; align-items: center; gap: 4px; }
.lb-btn {
  width: 34px; height: 34px; border-radius: 4px; border: 1px solid #ddd;
  background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #555; transition: background .15s, color .15s;
}
.lb-btn:hover { background: #f4f4f4; color: #111; }
.lb-btn svg { width: 14px; height: 14px; }
.lb-close {
  width: 34px; height: 34px; border-radius: 4px; border: 1px solid #ddd;
  background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #555; margin-left: 4px; transition: background .15s, color .15s;
}
.lb-close:hover { background: #f4f4f4; color: #111; }
.lb-close svg { width: 13px; height: 13px; }

/* Mobile-only: current page label beside monogram */
.nav-page-label {
  display: none;
  font-family: var(--mono); font-size: 9px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--dim);
  margin-left: 10px; vertical-align: middle;
}

@media (max-width: 768px) {
  /* Nav */
  nav { padding: 0 20px; backdrop-filter: blur(12px); }
  .nav-links { display: none; }
  .nav-status { display: none; }
  .nav-page-label { display: inline; }

  /* Page header */
  .page-header { padding: 88px 20px 36px; }
  .page-title { font-size: clamp(40px, 11vw, 96px); }
  .page-sub { color: var(--muted); }
  .page-desc { color: var(--muted); }

  /* Album grid: drop 560px minimum — single column fills the screen */
  .albums-wrap { padding: 24px 16px 120px; }
  .albums-grid { grid-template-columns: 1fr; gap: 16px; }
  .album-meta { color: var(--muted); }
  .album-count { color: var(--muted); }

  /* Album detail: stack header vertically */
  .album-detail-header {
    padding: 88px 20px 28px;
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }
  .album-detail-title { font-size: clamp(32px, 10vw, 64px); }
  .album-detail-meta { color: var(--muted); }
  .album-detail-count { color: var(--muted); }

  /* Photo grid padding */
  .grid-wrap { padding: 20px 16px 120px; }

  /* Lightbox: full viewport, hide counter to give image max room */
  .lightbox-frame { max-width: 100vw; max-height: 100vh; width: 100vw; }
  .lightbox-img-wrap img { max-width: 100vw; max-height: calc(100vh - 56px); }
  .lightbox-bar { padding: 10px 14px; }
  .lightbox-meta-loc { font-size: 12px; }
  .lightbox-counter { display: none; }
}
</style>
</head>

<!-- STICKY BACK LINK (appears when scrolled down in album view) -->

<!-- PAGE HEADER -->
<div class="page-header">

<!-- ALBUM LANDING -->

    <div class="albums-grid" id="albumsGrid"></div>

<!-- ALBUM DETAIL -->
<div id="albumDetail">
  <div class="album-detail-header">
    <div>
      <button class="album-back" id="albumBack">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9,2 4,7 9,12"/>
        </svg>
        All albums
      </button>
      <div class="album-detail-title" id="albumDetailTitle"></div>
      <div class="album-detail-meta" id="albumDetailMeta"></div>
    </div>
    <div class="album-detail-count" id="albumDetailCount"></div>
  </div>
  <div class="grid-wrap">
    <div class="photo-grid" id="photoGrid"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox-backdrop" id="lightbox" role="dialog" aria-modal="true">
  <div class="lightbox-frame" id="lightboxFrame">
    <div class="lightbox-img-wrap" id="lightboxImgWrap"></div>
    <div class="lightbox-bar">
      <div class="lightbox-meta">
        <div class="lightbox-meta-date" id="lbDate"></div>
        <div class="lightbox-meta-loc"  id="lbLoc"></div>
      </div>
      <div class="lightbox-counter" id="lbCounter"></div>
      <div class="lightbox-controls">
        <button class="lb-btn" id="lbPrev" aria-label="Previous">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,2 4,7 9,12"/></svg>
        </button>
        <button class="lb-btn" id="lbNext" aria-label="Next">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,2 10,7 5,12"/></svg>
        </button>
        <button class="lb-close" id="lbClose" aria-label="Close">
          <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="1" y1="1" x2="12" y2="12"/><line x1="12" y1="1" x2="1" y2="12"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   STATE
   ===================================================================== */
var albums = [];
var currentAlbum = null;
var currentIdx   = 0;

/* =====================================================================
   ALBUM LANDING
   ===================================================================== */
function buildAlbumLanding(albumList) {
  var grid  = document.getElementById('albumsGrid');
  var count = document.getElementById('photoCount');
  grid.innerHTML = '';

  var totalPhotos = albumList.reduce(function(n, a) { return n + a.photos.length; }, 0);
  count.textContent = albumList.length + ' album' + (albumList.length !== 1 ? 's' : '') +
    ' · ' + totalPhotos + ' photograph' + (totalPhotos !== 1 ? 's' : '');

  albumList.forEach(function(album) {
    var card = document.createElement('div');
    card.className = 'album-card';

    var coverSrcs = album.photos
      .map(function(p) { return p.src; })
      .filter(Boolean);

    /* Shuffle for random order */
    for (var i = coverSrcs.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = coverSrcs[i]; coverSrcs[i] = coverSrcs[j]; coverSrcs[j] = tmp;
    }

    var coverIdx = 0;
    card.innerHTML =
      '<div class="album-cover-wrap">' +
        (coverSrcs.length
          ? '<img class="album-cover-img behind" id="" alt="' + album.title + '">' +
            '<img class="album-cover-img" alt="' + album.title + '" src="' + coverSrcs[0] + '">'
          : '<div style="position:absolute;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px;font-family:var(--mono)">No photos</div>'
        ) +
      '</div>' +
      '<div class="album-info">' +
        '<div class="album-title">' + album.title + '</div>' +
        '<div class="album-meta">' +
          '<span>' + album.date + '</span>' +
          '<span class="album-count">' + album.photos.length + ' photo' + (album.photos.length !== 1 ? 's' : '') + '</span>' +
        '</div>' +
      '</div>';

    /* Crossfade cycle — front fades out over back, then they swap roles */
    if (coverSrcs.length > 1) {
      var imgs = card.querySelectorAll('.album-cover-img');
      var front = imgs[1], back = imgs[0];
      var cycleInterval = 3200 + Math.random() * 2000;
      var initialDelay  = Math.random() * cycleInterval;
      var cycling = false;

      setTimeout(function() {
        (function cycle() {
          if (cycling) return;
          cycling = true;
          coverIdx = (coverIdx + 1) % coverSrcs.length;

          /* Ensure back is fully hidden before we load into it */
          back.classList.add('behind');
          back.src = coverSrcs[coverIdx];

          function doSwap() {
            /* back is loaded — reveal it by fading front out */
            front.classList.add('behind');
            back.classList.remove('behind');
            /* After CSS transition finishes, tidy up and schedule next */
            setTimeout(function() {
              var tmp = front; front = back; back = tmp;
              cycling = false;
              setTimeout(cycle, cycleInterval);
            }, 1400);
          }

          /* decode() resolves even for cached images;
             fall back to onload for older browsers */
          if (back.decode) {
            back.decode().then(doSwap).catch(doSwap);
          } else {
            if (back.complete) { doSwap(); }
            else { back.onload = doSwap; back.onerror = doSwap; }
          }
        })();
      }, initialDelay);
    }

    card.addEventListener('click', function() { openAlbum(album); });
    grid.appendChild(card);
  });
}

/* =====================================================================
   ALBUM DETAIL
   ===================================================================== */
function openAlbum(album) {
  currentAlbum = album;
  document.querySelector('.page-header').classList.add('hidden');
  document.getElementById('albumLanding').style.display = 'none';
  document.getElementById('albumDetail').style.display  = 'block';
  document.getElementById('albumDetailTitle').textContent = album.title;
  document.getElementById('albumDetailMeta').textContent  = album.date + (album.location ? '  ·  ' + album.location : '');
  document.getElementById('albumDetailCount').textContent = album.photos.length + ' photograph' + (album.photos.length !== 1 ? 's' : '');
  buildPhotoGrid(album.photos);
  window.scrollTo(0, 0);

  history.pushState({ album: album.id }, '', '/photography#' + album.id);
}

function closeAlbum() {
  document.getElementById('albumDetail').style.display  = 'none';
  document.getElementById('albumLanding').style.display = 'block';
  document.querySelector('.page-header').classList.remove('hidden');
  document.getElementById('stickyBack').classList.remove('visible');
  currentAlbum = null;
  history.pushState({}, '', '/photography');
  window.scrollTo(0, 0);
}

document.getElementById('albumBack').addEventListener('click', closeAlbum);
document.getElementById('stickyBack').addEventListener('click', closeAlbum);

/* Show sticky back link once user scrolls past the album header */
window.addEventListener('scroll', function() {
  if (!currentAlbum) return;
  var header = document.querySelector('.album-detail-header');
  if (!header) return;
  var threshold = header.offsetTop + header.offsetHeight;
  var stickyBack = document.getElementById('stickyBack');
  if (window.scrollY > threshold) {
    stickyBack.classList.add('visible');
  } else {
    stickyBack.classList.remove('visible');
  }
});

window.addEventListener('popstate', function(e) {
  var hash = window.location.hash.slice(1);
  if (hash) {
    var album = albums.find(function(a) { return a.id === hash; });
    if (album) { openAlbum(album); return; }
  }
  closeAlbum();
});

/* =====================================================================
   PHOTO GRID
   ===================================================================== */
function buildPhotoGrid(photos) {
  var grid = document.getElementById('photoGrid');
  grid.innerHTML = '';

  photos.forEach(function(p) {
    if (p.src) { var pre = new Image(); pre.src = p.src; }
  });

  photos.forEach(function(p, i) {
    var item = document.createElement('div');
    item.className = 'photo-item';

    if (p.src) {
      var padPct = ((p.aspect || 0.75) * 100).toFixed(1) + '%';
      item.innerHTML =
        '<div class="photo-item-inner" style="--aspect-pad:' + padPct + '">' +
          '<img src="' + p.src + '" alt="' + (p.location || '') + '" loading="lazy">' +
        '</div>' +
        '<div class="photo-overlay">' +
          '<div class="photo-meta-date">' + (p.date || '') + '</div>' +
          '<div class="photo-meta-loc">'  + (p.location || '') + '</div>' +
        '</div>';
    } else {
      item.innerHTML =
        '<div style="width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:10px;font-family:var(--mono)">Photo ' + String(i+1).padStart(2,'0') + '</div>' +
        '<div class="photo-overlay">' +
          '<div class="photo-meta-date">' + (p.date || '') + '</div>' +
          '<div class="photo-meta-loc">'  + (p.location || '') + '</div>' +
        '</div>';
    }

    item.addEventListener('click', function() { openLightbox(i); });
    grid.appendChild(item);
  });

  setTimeout(function() {
    var spill = document.getElementById('neonSpill');
    if (spill) spill.style.top = (document.body.scrollHeight - 90) + 'px';
  }, 300);
}

/* =====================================================================
   LIGHTBOX
   ===================================================================== */
function openLightbox(idx) {
  if (!currentAlbum) return;
  currentIdx = idx;
  renderLightboxPhoto();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function renderLightboxPhoto() {
  var photos = currentAlbum.photos;
  var p      = photos[currentIdx];
  var wrap   = document.getElementById('lightboxImgWrap');

  if (p.src) {
    var src = (p.full && p.full !== p.src) ? p.full : p.src;
    wrap.innerHTML = '<img src="' + src + '" alt="' + (p.location || '') + '">';
  } else {
    wrap.innerHTML = '<div style="color:#888;font-family:var(--mono);font-size:11px">Photo ' + String(currentIdx+1).padStart(2,'0') + '</div>';
  }

  document.getElementById('lbDate').textContent    = p.date     || '';
  document.getElementById('lbLoc').textContent     = p.location || '';
  document.getElementById('lbCounter').textContent =
    String(currentIdx + 1).padStart(2,'0') + ' / ' + String(photos.length).padStart(2,'0');
}

function navigate(dir) {
  if (!currentAlbum) return;
  currentIdx = (currentIdx + dir + currentAlbum.photos.length) % currentAlbum.photos.length;
  renderLightboxPhoto();
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', function() { navigate(-1); });
document.getElementById('lbNext').addEventListener('click', function() { navigate(1); });
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

/* =====================================================================
   BOOTSTRAP
   ===================================================================== */
fetch('../content.json')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    document.getElementById('navStatus').textContent = d.hero.status;
    document.title = 'Photography — ' + d.site.title;
    window._txStyle = d.site.transition_style || 'slingshot';

    var descEl = document.getElementById('photoDesc');
    if (descEl && d.photography_desc) descEl.textContent = d.photography_desc;

    /* ── FIX: make all photo paths root-relative so they resolve correctly
       regardless of which subdirectory this page is served from ── */
    (d.photography || []).forEach(function(album) {
      (album.photos || []).forEach(function(p) {
        if (p.src  && !p.src.startsWith('/')  && !p.src.startsWith('http'))  p.src  = '/' + p.src;
        if (p.full && !p.full.startsWith('/') && !p.full.startsWith('http')) p.full = '/' + p.full;
      });
    });

    albums = d.photography || [];

    /* ── Build virtual Favorites album from photos tagged favorite:true ── */
    var favPhotos = [];
    albums.forEach(function(album) {
      (album.photos || []).forEach(function(p) {
        if (p.favorite) favPhotos.push(p);
      });
    });
    if (favPhotos.length > 0) {
      albums = [{ id: 'favorites', title: 'Favorites', date: '', location: '', photos: favPhotos }].concat(albums);
    }

    buildAlbumLanding(albums);
    injectNeonSpill();

    var hash = window.location.hash.slice(1);
    if (hash) {
      var album = albums.find(function(a) { return a.id === hash; });
      if (album) openAlbum(album);
    }
  })
  .catch(function() {
    albums = [];
    buildAlbumLanding([]);
    injectNeonSpill();
  });

/* =====================================================================
   NEON SPILL
   ===================================================================== */
function injectNeonSpill() {
  var old = document.getElementById('neonSpill');
  if (old) old.remove();
  var palette = [[96,200,255],[160,100,255],[255,100,160],[60,220,180],[255,200,60],[100,255,200],[255,140,80],[180,140,255],[80,220,255],[184,118,26]];
  var _seed = Date.now() % 99991;
  function rand() { _seed = (_seed * 1664525 + 1013904223) & 0xffffffff; return ((_seed >>> 0) / 0xffffffff); }
  var spillH = 90, pageW = Math.max(document.body.scrollWidth, window.innerWidth);
  var spillTop = document.body.scrollHeight - spillH;
  var NUM = 16, strings = [];
  for (var i = 0; i < NUM; i++) {
    var col = palette[i % palette.length];
    strings.push({ col, baseY: spillH*(0.30+0.55*(i/(NUM-1)))+(rand()-0.5)*6, freq: 0.006+rand()*0.016, amp: 3.5+rand()*6.5, phase: rand()*Math.PI*2, breathRate: 0.08+rand()*0.18, breathDepth: 0.12+rand()*0.22, breathOff: rand()*Math.PI*2, pulseRate: 0.4+rand()*1.2, pulseDepth: 0.15+rand()*0.35, pulseOff: rand()*Math.PI*2, shimmerRate: 0.05+rand()*0.12, shimmerAmt: 0.08+rand()*0.18, shimmerOff: rand()*Math.PI*2, driftRate: 0.004+rand()*0.008, baseAlpha: 0.38+rand()*0.38, lineW: 0.8+rand()*1.2 });
  }
  window._spillStrings = strings;
  window._spillH = spillH;
  var cv = document.createElement('canvas');
  cv.id  = 'neonSpill';
  var dpr = window.devicePixelRatio || 1;
  cv.width  = Math.round(pageW * dpr);
  cv.height = Math.round(spillH * dpr);
  cv.style.cssText = ['position:absolute','left:0','top:'+spillTop+'px','width:'+pageW+'px','height:'+spillH+'px','pointer-events:none','z-index:1','opacity:0','transition:opacity 2s ease'].join(';');
  document.body.appendChild(cv);
  requestAnimationFrame(function() { requestAnimationFrame(function() { cv.style.opacity = '1'; }); });
  function repositionSpill() { var t = document.body.scrollHeight - spillH; if (cv.style.top !== t+'px') cv.style.top = t+'px'; }
  if (window.ResizeObserver) { var ro = new ResizeObserver(repositionSpill); ro.observe(document.body); }
  [500,1000,2000,4000].forEach(function(ms) { setTimeout(repositionSpill, ms); });
  var cx = cv.getContext('2d'), spillClock = 0, spillLast = null, fadeIn = 0;
  function spillDraw(ts) {
    if (document.hidden) { requestAnimationFrame(spillDraw); return; }
    var dt = spillLast ? Math.min((ts-spillLast)/1000,0.05) : 0.016;
    spillLast = ts; spillClock += dt; fadeIn = Math.min(1, spillClock/2.0);
    window._spillClock = spillClock;
    cx.setTransform(dpr,0,0,dpr,0,0); cx.clearRect(0,0,pageW,spillH);
    for (var i = 0; i < NUM; i++) {
      var s=strings[i],c=s.col;
      var breath=1+s.breathDepth*Math.sin(spillClock*s.breathRate*Math.PI*2+s.breathOff);
      var rawP=Math.sin(spillClock*s.pulseRate*Math.PI*2+s.pulseOff);
      var pulse=s.pulseDepth*Math.max(0,rawP)*Math.max(0,rawP);
      var alpha=Math.min(0.92,s.baseAlpha*(breath+pulse)*fadeIn);
      var effAmp=s.amp*breath, drift=spillClock*s.driftRate;
      cx.beginPath();
      for (var x=0;x<=pageW;x+=3){var sh=1+s.shimmerAmt*Math.sin(x*0.004+spillClock*s.shimmerRate*Math.PI*2+s.shimmerOff);var y=s.baseY+Math.sin(x*s.freq+s.phase+drift)*effAmp*sh;x===0?cx.moveTo(x,y):cx.lineTo(x,y);}
      cx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+(alpha*0.55)+')';cx.lineWidth=s.lineW+1.5+pulse*3;cx.shadowColor='rgba('+c[0]+','+c[1]+','+c[2]+','+(alpha*0.7)+')';cx.shadowBlur=10+pulse*14;cx.stroke();cx.shadowBlur=0;
      cx.beginPath();
      for (var x=0;x<=pageW;x+=2){var sh=1+s.shimmerAmt*Math.sin(x*0.004+spillClock*s.shimmerRate*Math.PI*2+s.shimmerOff);var y=s.baseY+Math.sin(x*s.freq+s.phase+drift)*effAmp*sh;x===0?cx.moveTo(x,y):cx.lineTo(x,y);}
      cx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+alpha+')';cx.lineWidth=s.lineW;cx.stroke();
    }
    requestAnimationFrame(spillDraw);
  }
  requestAnimationFrame(spillDraw);
}

/* Dropdown */
(function() {
  function init() {
    var trigger = document.getElementById('navMonogram');
    var dropdown = document.getElementById('navDropdown');
    if (!trigger || !dropdown) return;
    function close() { trigger.classList.remove('open'); trigger.setAttribute('aria-expanded','false'); }
    function toggle() { trigger.classList.contains('open') ? close() : (trigger.classList.add('open'), trigger.setAttribute('aria-expanded','true')); }
    trigger.addEventListener('click', function(e) { e.stopPropagation(); toggle(); });
    trigger.addEventListener('keydown', function(e) { if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}if(e.key==='Escape')close(); });
    document.addEventListener('click', function(e) { if(!trigger.contains(e.target)) close(); });
    document.addEventListener('keydown', function(e) { if(e.key==='Escape') close(); });
    dropdown.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', close); });
  }
  document.readyState==='loading' ? document.addEventListener('DOMContentLoaded',init) : init();
})();
</script>
<script src="../transitions.js"></script>
</body>
</html>
