<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading…</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&family=Chivo+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0d0f14;
  --bg2:   #13161c;
  --bg3:   #1a1e26;
  --line:  #1e2530;
  --ice:   #60c8ff;
  --ice2:  #90dcff;
  --text:  #e8edf5;
  --muted: #7a8a9e;
  --dim:   #38445a;
  --display: 'Syne', sans-serif;
  --mono:    'Syne Mono', monospace;
  --body:    'Chivo Mono', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--body); min-height: 100vh; overflow-x: hidden;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(180deg, transparent 0px, transparent 3px, rgba(255,255,255,.008) 3px, rgba(255,255,255,.008) 4px),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 50% 35% at 0% 100%, rgba(96,200,255,.03) 0%, transparent 70%),
    radial-gradient(ellipse 40% 25% at 100% 0%,  rgba(96,200,255,.02) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 60px;
  background: rgba(13,15,20,.94); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  transition: border-bottom-color 0.3s ease, box-shadow 0.3s ease;
}
nav.waveform-active {
  border-bottom-color: var(--ice);
  box-shadow: 0 0 20px rgba(96,200,255,.15);
}
.nav-logo {
  font-family: var(--display); font-size: 13px; font-weight: 800;
  letter-spacing: -.01em; color: var(--text);
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.logo-orb-wrap {
  position: relative; display: flex; align-items: center;
  justify-content: center; width: 16px; height: 16px; flex-shrink: 0;
}
.logo-orb-wrap::before {
  content: ''; position: absolute; width: 16px; height: 16px;
  border-radius: 50%; border: 1px solid rgba(96,200,255,.25);
  animation: ringpulse 3s ease-in-out infinite;
}
@keyframes ringpulse {
  0%,100% { transform: scale(1); opacity: .5; }
  50%      { transform: scale(2); opacity: 0; }
}
.logo-orb {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #d0e8ff, #60c8ff 40%, #1a3050 100%);
  box-shadow: 0 0 10px rgba(96,200,255,.5), inset 0 1px 1px rgba(255,255,255,.4);
  animation: orbpulse 3s ease-in-out infinite; position: relative; z-index: 1;
}
@keyframes orbpulse {
  0%,100% { box-shadow: 0 0 10px rgba(96,200,255,.5), inset 0 1px 1px rgba(255,255,255,.4); }
  50%      { box-shadow: 0 0 20px rgba(96,200,255,.75), inset 0 1px 1px rgba(255,255,255,.5); }
}
.nav-links {
  display: flex; gap: 6px;
  font-family: var(--display); font-size: 8.5px;
  font-weight: 700; letter-spacing: .15em; text-transform: uppercase;
}
.nav-links a {
  padding: 5px 14px; border-radius: 99px; border: 1px solid var(--line);
  color: var(--dim); text-decoration: none; white-space: nowrap;
  transition: color .25s, border-color .25s, background .25s, box-shadow .25s;
}
.nav-links a:hover { color: var(--muted); border-color: var(--dim); }
.nav-links a.illuminated {
  background: linear-gradient(135deg, #1e2d3d, #162230);
  color: var(--ice2); border-color: rgba(96,200,255,.35);
  box-shadow: 0 0 12px rgba(96,200,255,.18), inset 0 1px 0 rgba(96,200,255,.08);
}
.nav-status {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 9px; color: var(--dim);
}
.nav-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--muted);
  animation: dotpulse 2.2s ease-in-out infinite;
}
@keyframes dotpulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

/* HERO */
.hero {
  position: relative; z-index: 3; min-height: 100vh;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 0 48px 80px; border-bottom: 1px solid var(--line);
}
#waveCanvas {
  position: fixed; top: 60px; left: 0; width: 100%;
  pointer-events: none; z-index: 2;
}
.hero-orb-backdrop {
  position: absolute; bottom: 60px; right: -100px;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(96,200,255,.08) 0%, rgba(96,200,255,.02) 30%, transparent 70%);
  pointer-events: none; filter: blur(40px); z-index: 0;
}
.hero-monogram {
  position: absolute; bottom: -60px; right: -20px;
  font-family: var(--display); font-size: clamp(200px, 28vw, 420px);
  font-weight: 800; line-height: 1; letter-spacing: -.08em;
  color: rgba(232,237,245,.03); pointer-events: none;
  user-select: none; white-space: nowrap;
}
.hero-eyebrow {
  font-family: var(--mono); font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px;
  animation: fadeUp .6s .1s ease both;
}
.hero-eyebrow::before {
  content: ''; display: inline-block; width: 32px; height: 1px;
  background: var(--dim); opacity: .8;
}
.hero-name {
  font-family: var(--display); font-size: clamp(60px, 8vw, 120px);
  font-weight: 800; line-height: .88; letter-spacing: -.04em;
  color: var(--text); margin-bottom: 40px; position: relative; z-index: 3;
}
.hero-name .char {
  display: inline-block; opacity: 0; transform: translateY(22px);
  animation: charIn .55s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes charIn { to { opacity: 1; transform: translateY(0); } }
.hero-bottom {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 40px; animation: fadeUp .6s .5s ease both; position: relative; z-index: 3;
}
.hero-tagline {
  font-family: var(--display); font-size: 11px; font-variant: small-caps;
  letter-spacing: .09em; color: var(--muted); line-height: 1.85; max-width: 420px;
}
.hero-meta {
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 8px; font-family: var(--mono); font-size: 9px;
  color: var(--dim); text-align: right; flex-shrink: 0; padding-bottom: 4px;
}
.hero-meta span { letter-spacing: .06em; }
.hero-meta strong { color: var(--muted); font-weight: 400; }
.scroll-hint {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 8px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--dim);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: fadeUp .5s .9s ease both;
}
.scroll-hint::after {
  content: ''; width: 1px; height: 36px;
  background: linear-gradient(to bottom, var(--dim), transparent);
  animation: scrolldown 1.9s ease-in-out infinite;
}
@keyframes scrolldown { 0%,100% { opacity: .3; } 50% { opacity: .8; } }

/* FILTER BAR */
.filter-bar {
  position: sticky; top: 60px; z-index: 100;
  display: flex; align-items: center; padding: 0 48px;
  border-bottom: 1px solid var(--line);
  background: rgba(13,15,20,.97); backdrop-filter: blur(16px);
  overflow-x: auto;
}
.filter-btn {
  padding: 18px 0; margin-right: 32px; font-family: var(--display);
  font-size: 8.5px; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; color: var(--dim); background: none;
  border: none; cursor: pointer; position: relative; white-space: nowrap;
  transition: color .2s;
}
.filter-btn::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--ice);
  transform: scaleX(0); transition: transform .25s ease;
}
.filter-btn:hover { color: var(--muted); }
.filter-btn.active { color: var(--text); }
.filter-btn.active::after { transform: scaleX(1); }

/* WORK INDEX */
.work-section { position: relative; z-index: 1; }
.work-index { display: grid; grid-template-columns: 1fr; border-bottom: 1px solid var(--line); }
.work-row {
  display: grid; grid-template-columns: 72px 1fr auto; align-items: center;
  border-top: 1px solid var(--line); border-left: 2px solid transparent;
  cursor: pointer; text-decoration: none; color: inherit;
  position: relative; overflow: hidden;
  transition: border-left-color .25s ease, background .25s ease;
}
.work-row::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, var(--ice), rgba(96,200,255,0));
  opacity: 0; transition: opacity .25s ease; pointer-events: none;
}
.work-row:hover { border-left-color: var(--ice); background: rgba(19,22,28,.8); }
.work-row:hover::after { opacity: 1; }
.work-row:hover .row-num   { color: var(--muted); }
.work-row:hover .row-title { opacity: 1; transform: translateX(6px); }
.work-row:hover .row-tags  { transform: translateX(6px); }
.work-row:hover .row-arrow { opacity: 1; transform: translateX(0); color: var(--ice); }
.row-num {
  padding: 32px 0 32px 48px; font-family: var(--mono); font-size: 10px;
  color: var(--dim); letter-spacing: .06em; transition: color .25s;
  position: relative; z-index: 1;
}
.row-body { padding: 32px 32px; position: relative; z-index: 1; }
.row-title {
  font-family: var(--display); font-size: clamp(24px, 3.2vw, 44px);
  font-weight: 800; letter-spacing: -.025em; color: var(--text);
  line-height: 1; opacity: .6; margin-bottom: 10px;
  transition: opacity .25s, transform .3s cubic-bezier(.25,.46,.45,.94);
}
.row-tags { display: flex; gap: 8px; flex-wrap: wrap; transition: transform .3s cubic-bezier(.25,.46,.45,.94); }
.row-tag {
  font-family: var(--display); font-size: 7px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; padding: 3px 10px;
  border-radius: 99px; border: 1px solid var(--line); color: var(--dim);
}
.row-right {
  padding: 32px 48px 32px 32px; display: flex; align-items: center;
  gap: 20px; position: relative; z-index: 1;
}
.row-year { font-family: var(--mono); font-size: 9px; color: var(--dim); letter-spacing: .08em; white-space: nowrap; }
.row-arrow {
  font-size: 16px; color: var(--dim); opacity: 0; transform: translateX(-10px);
  transition: opacity .2s, transform .25s ease, color .2s;
}

/* ABOUT STRIP */
.info-strip {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--line);
}
.info-left { padding: 64px 48px; border-right: 1px solid var(--line); }
.info-right { padding: 64px 48px; display: flex; flex-direction: column; gap: 48px; }
.info-eyebrow {
  font-family: var(--mono); font-size: 8.5px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 24px;
  display: flex; align-items: center; gap: 10px;
}
.info-eyebrow::before {
  content: ''; display: inline-block; width: 24px; height: 1px;
  background: var(--dim); opacity: .8;
}
.info-body { font-family: var(--body); font-size: 12px; color: var(--muted); line-height: 1.8; }
.stat-block { display: flex; flex-direction: column; gap: 4px; }
.stat-label { font-family: var(--mono); font-size: 8px; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); }
.stat-value { font-family: var(--display); font-size: 38px; font-weight: 800; letter-spacing: -.03em; color: var(--text); line-height: 1; }
.stat-sub { font-family: var(--body); font-size: 9px; color: var(--dim); font-style: italic; margin-top: 2px; }

/* SKILLS */
.skills-section { position: relative; z-index: 1; padding: 48px; border-bottom: 1px solid var(--line); }
.skills-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
.skill-chip {
  padding: 8px 18px; border: 1px solid var(--line); border-radius: 99px;
  font-family: var(--display); font-size: 8.5px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
  cursor: default; transition: border-color .2s, color .2s;
}
.skill-chip:hover { border-color: var(--muted); color: var(--text); }

/* FOOTER */
footer {
  position: relative; z-index: 1; display: flex; align-items: center;
  justify-content: space-between; padding: 28px 48px;
  font-family: var(--mono); font-size: 9px; color: var(--dim);
}
.footer-links { display: flex; gap: 28px; }
.footer-links a { color: var(--dim); text-decoration: none; letter-spacing: .06em; transition: color .2s; }
.footer-links a:hover { color: var(--text); }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.work-row { opacity: 0; animation: fadeUp .5s ease forwards; }
.work-row:nth-child(1) { animation-delay: .05s; }
.work-row:nth-child(2) { animation-delay: .13s; }
.work-row:nth-child(3) { animation-delay: .21s; }
.work-row:nth-child(4) { animation-delay: .29s; }
.work-row:nth-child(5) { animation-delay: .37s; }

/* RESPONSIVE */
@media (max-width: 768px) {
  nav { padding: 0 24px; }
  .nav-status { display: none; }
  .hero { padding: 0 24px 72px; }
  .hero-bottom { flex-direction: column; align-items: flex-start; }
  .hero-meta { align-items: flex-start; text-align: left; }
  .filter-bar { padding: 0 24px; }
  .work-row { grid-template-columns: 48px 1fr auto; }
  .row-num { padding-left: 24px; }
  .row-right { padding-right: 24px; }
  .row-year { display: none; }
  .info-strip { grid-template-columns: 1fr; }
  .info-left { border-right: none; border-bottom: 1px solid var(--line); padding: 40px 24px; }
  .info-right { padding: 40px 24px; }
  .skills-section { padding: 40px 24px; }
  footer { flex-direction: column; gap: 12px; align-items: flex-start; padding: 24px; }
}
</style>
</head>
<body>

<nav id="mainNav">
  <a href="#" class="nav-logo" id="navLogo">
    <div class="logo-orb-wrap"><div class="logo-orb"></div></div>
    <span id="navName">…</span>
  </a>
  <div class="nav-links" id="navLinks">
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a id="navContact" href="#">Contact</a>
  </div>
  <div class="nav-status">
    <div class="nav-dot"></div>
    <span id="navStatus">…</span>
  </div>
</nav>

<canvas id="waveCanvas"></canvas>

<div class="hero" id="hero">
  <div class="hero-orb-backdrop"></div>
  <div class="hero-monogram" id="heroMonogram"></div>
  <div class="hero-eyebrow" id="heroEyebrow"></div>
  <div class="hero-name" id="heroName"></div>
  <div class="hero-bottom">
    <div class="hero-tagline" id="heroTagline"></div>
    <div class="hero-meta" id="heroMeta"></div>
  </div>
  <div class="scroll-hint">Scroll</div>
</div>

<div class="filter-bar" id="work">
  <button class="filter-btn active" onclick="filterWork('all',this)">All</button>
  <button class="filter-btn" onclick="filterWork('engineering',this)">Engineering</button>
  <button class="filter-btn" onclick="filterWork('finance',this)">Finance</button>
  <button class="filter-btn" onclick="filterWork('design',this)">Design</button>
</div>

<div class="work-section">
  <div class="work-index" id="workIndex"></div>
</div>

<div class="info-strip" id="about">
  <div class="info-left">
    <div class="info-eyebrow">About</div>
    <div class="info-body" id="aboutBody"></div>
  </div>
  <div class="info-right" id="aboutStats"></div>
</div>

<div class="skills-section">
  <div class="info-eyebrow">Skills &amp; Tools</div>
  <div class="skills-grid" id="skillsGrid"></div>
</div>

<footer>
  <span id="footerCopy"></span>
  <div class="footer-links" id="footerLinks"></div>
</footer>

<script>
/* =====================================================================
   CONTENT LOADER — reads content.json and populates the page
   ===================================================================== */
fetch('content.json')
  .then(function(r) { return r.json(); })
  .then(function(d) { populatePage(d); initWave(d.site.intro_animation || 'storm'); })
  .catch(function(e) {
    console.warn('content.json not found, using fallback content.', e);
    // Fallback so the page still works without a server (local file:// open)
    var fallback = {
      site: { title: 'Your Name', intro_animation: 'storm' },
      nav:  { email: 'you@example.com' },
      hero: { eyebrow: 'Portfolio — 2026', name_line1: 'Your', name_line2: 'Name',
              monogram: 'YN', tagline: 'A short, honest line about what you build and why it matters.',
              location: 'Your City', focus: 'Engineering · Finance · Design', status: 'Open to collaborations' },
      projects: [
        { num:'01', title:'Project Name', tags:['Engineering','Python'], year:'2025', cat:'engineering', url:'#' },
        { num:'02', title:'Project Name', tags:['Finance','Data'],       year:'2025', cat:'finance',     url:'#' },
        { num:'03', title:'Project Name', tags:['Design','UI'],          year:'2024', cat:'design',      url:'#' }
      ],
      about: { body: 'Write a few sentences about yourself here.',
               stats: [{ label:'Current Focus', value:'Building', sub:'what\'s on your bench' },
                       { label:'Based in',       value:'City',     sub:'open to remote' }] },
      skills: ['Python','JavaScript','React','Finance','Data Analysis','Systems Design','UI / UX'],
      footer: { github:'#', linkedin:'#', email:'you@example.com' }
    };
    populatePage(fallback);
    initWave(fallback.site.intro_animation);
  });

function populatePage(d) {
  // <title> + nav
  document.title = d.site.title;
  document.getElementById('navName').textContent = d.site.title;
  document.getElementById('navContact').href = 'mailto:' + d.nav.email;
  document.getElementById('navStatus').textContent = d.hero.status;

  // Hero
  document.getElementById('heroMonogram').textContent = d.hero.monogram;
  document.getElementById('heroEyebrow').textContent  = d.hero.eyebrow;
  document.getElementById('heroTagline').textContent  = d.hero.tagline;

  // Hero meta
  var meta = document.getElementById('heroMeta');
  meta.innerHTML =
    '<span><strong>Based in</strong> ' + d.hero.location + '</span>' +
    '<span><strong>Focus</strong> '    + d.hero.focus    + '</span>' +
    '<span><strong>Status</strong> '   + d.hero.status   + '</span>';

  // Hero name — split to two lines then animate letter-by-letter
  var nameEl = document.getElementById('heroName');
  nameEl.innerHTML = d.hero.name_line1 + '<br>' + d.hero.name_line2;
  animateName(nameEl);

  // Projects
  var idx = document.getElementById('workIndex');
  idx.innerHTML = '';
  d.projects.forEach(function(p) {
    var tags = p.tags.map(function(t) { return '<span class="row-tag">' + t + '</span>'; }).join('');
    var row = document.createElement('a');
    row.href       = p.url;
    row.className  = 'work-row';
    row.dataset.cat = p.cat;
    row.innerHTML  =
      '<div class="row-num">' + p.num + '</div>' +
      '<div class="row-body"><div class="row-title">' + p.title + '</div>' +
      '<div class="row-tags">' + tags + '</div></div>' +
      '<div class="row-right"><span class="row-year">' + p.year + '</span>' +
      '<span class="row-arrow">→</span></div>';
    idx.appendChild(row);
  });

  // About body (supports \n\n as paragraph break)
  var aboutEl = document.getElementById('aboutBody');
  aboutEl.innerHTML = d.about.body.split('\n\n').map(function(p) {
    return '<p>' + p + '</p>';
  }).join('');

  // About stats
  var statsEl = document.getElementById('aboutStats');
  statsEl.innerHTML = d.about.stats.map(function(s) {
    return '<div class="stat-block">' +
      '<div class="stat-label">'  + s.label + '</div>' +
      '<div class="stat-value">'  + s.value + '</div>' +
      '<div class="stat-sub">'    + s.sub   + '</div>' +
      '</div>';
  }).join('');

  // Skills
  document.getElementById('skillsGrid').innerHTML = d.skills.map(function(s) {
    return '<span class="skill-chip">' + s + '</span>';
  }).join('');

  // Footer
  var year = new Date().getFullYear();
  document.getElementById('footerCopy').textContent = '© ' + year + ' ' + d.site.title;
  document.getElementById('footerLinks').innerHTML =
    '<a href="' + d.footer.github   + '">GitHub</a>' +
    '<a href="' + d.footer.linkedin + '">LinkedIn</a>' +
    '<a href="mailto:' + d.footer.email + '">Email</a>';
}

function animateName(el) {
  var nodes = Array.from(el.childNodes);
  var out = '', delay = 0.28;
  nodes.forEach(function(n) {
    if (n.nodeType === 3) {
      n.textContent.split('').forEach(function(ch) {
        if (ch === ' ') { out += ' '; }
        else {
          out += '<span class="char" style="animation-delay:' + delay.toFixed(2) + 's">' + ch + '</span>';
          delay += 0.048;
        }
      });
    } else if (n.nodeName === 'BR') {
      out += '<br>'; delay += 0.06;
    }
  });
  el.innerHTML = out;
}

/* Work filtering */
function filterWork(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var visIdx = 0;
  document.querySelectorAll('.work-row').forEach(function(row) {
    var match = cat === 'all' || row.dataset.cat === cat;
    if (match) {
      row.style.display = 'grid'; row.style.opacity = '0';
      row.style.animation = 'none'; void row.offsetHeight;
      row.style.animation = 'fadeUp .4s ' + (visIdx * 0.07) + 's ease forwards';
      visIdx++;
    } else { row.style.display = 'none'; }
  });
}

/* =====================================================================
   WAVEFORM ENGINE
   intro_animation options (set in content.json → site.intro_animation):
     "explosion" — chaotic burst that calms into the steady wave
     "storm"     — multiple waves pulse and merge into the two clean lines
     "none"      — wave appears immediately with no intro
   ===================================================================== */
function initWave(introMode) {
  var canvas   = document.getElementById('waveCanvas');
  var nav      = document.getElementById('mainNav');
  var navLinks = document.querySelectorAll('.nav-links a');
  var hero     = document.querySelector('.hero');
  if (!canvas || !nav || !hero) return;

  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var bufW = 0, bufH = 0;
  var mouseXNorm = 0.5;
  var cachedScrollY = 0;

  /* ---- intro state ---- */
  var INTRO_DUR  = 5.0;  // seconds for intro to complete
  var XFADE_DUR  = 2.0;  // crossfade window after intro ends
  var introT     = 0;    // 0→1 over INTRO_DUR real-seconds
  var xfadeT     = 0;    // 0→1 over XFADE_DUR after intro ends
  var xfadeActive = false;
  var introActive = (introMode !== 'none');
  var clock      = 0;    // real elapsed seconds

  /* ---- steady-state wave clock ---- */
  var t = 0;

  /* ---- ghost amplitude drift ---- */
  var ghostDriftT = 0; // slow independent clock for ghost amp variation
  var mainDriftT  = 0; // offset drift clock for main wave — runs at different speed

  /* ---- store non-keeper wave state so xfade can continue fading them out ---- */
  var nonKeeperAlphas = []; // per-wave alpha at moment intro ended, for xfade fadeout

  /* ---- jitter ---- */
  var jitterActive = false, jitterEnd = 0, speedMul = 1;
  var nextJitter   = INTRO_DUR + 3 + Math.random() * 5;

  function scheduleNextJitter() { nextJitter = t + 2 + Math.random() * 6; }

  /* ---- pulse wiggle ---- */
  // Independent of jitter — adds a high-freq ripple that rises and decays
  var wiggleActive   = false;
  var wiggleT        = 0;    // local time within current wiggle event (0→wiggleDur)
  var wiggleDur      = 1.8;  // seconds for one wiggle event
  var wiggleFreq     = 0;    // spatial frequency of the ripple
  var wiggleAmpScale = 0;    // peak amplitude multiplier (randomised per event)
  var nextWiggle     = INTRO_DUR + 1.5 + Math.random() * 4;

  function scheduleNextWiggle() {
    nextWiggle     = t + 3 + Math.random() * 9;   // next event in 3–12s
    wiggleDur      = 1.2 + Math.random() * 1.6;   // event lasts 1.2–2.8s
    wiggleFreq     = 0.018 + Math.random() * 0.028; // tight-to-loose ripple
    wiggleAmpScale = 0.35 + Math.random() * 0.55;  // subtle-to-strong
  }

  function syncBuffer() {
    var w = window.innerWidth;
    var h = window.innerHeight - 60;
    if (h < 50) h = window.innerHeight;
    if (w < 1 || h < 1) return false;
    if (w === bufW && h === bufH) return true;
    bufW = w; bufH = h;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width  = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    return true;
  }

  window.addEventListener('resize', function() { bufW = 0; bufH = 0; });
  window.addEventListener('mousemove', function(e) { mouseXNorm = e.clientX / window.innerWidth; });
  window.addEventListener('scroll', function() { cachedScrollY = window.scrollY || 0; }, { passive: true });

  function getScrollPct() {
    if (!hero.offsetHeight) return 0;
    return Math.min(1, Math.max(0, cachedScrollY / (hero.offsetHeight * 0.55)));
  }
  function updateNav(sp) {
    if (sp >= 1) {
      nav.classList.add('waveform-active');
      navLinks.forEach(function(a) { a.classList.add('illuminated'); });
    } else {
      nav.classList.remove('waveform-active');
      navLinks.forEach(function(a) { a.classList.remove('illuminated'); });
    }
  }

  /* ease functions */
  function easeOutCubic(x)  { return 1 - Math.pow(1 - x, 3); }
  function easeOutQuint(x)  { return 1 - Math.pow(1 - x, 5); }
  function easeInOutSine(x) { return -(Math.cos(Math.PI * x) - 1) / 2; }

  /* smooth clamp helper: remap [a,b] → [0,1] */
  function remap(v, a, b) { return Math.min(1, Math.max(0, (v - a) / (b - a))); }

  var lastTimestamp = null;
  var smoothDt = 0.016;
  var amberFadeAlpha = 0; // carries ghost sub-wave alpha from intro into xfade

  function draw(timestamp) {
    if (!syncBuffer()) { requestAnimationFrame(draw); return; }
    var dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, 0.05) : 0.016;
    lastTimestamp = timestamp;
    // Smooth dt with a light EMA to reduce micro-jerk from frame timing variance
    dt = smoothDt = smoothDt * 0.85 + dt * 0.15;

    var w = bufW, h = bufH;
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    var sp = getScrollPct();
    updateNav(sp);

    /* advance clocks */
    clock += dt;
    if (introActive) {
      introT = Math.min(1, clock / INTRO_DUR);
      if (introT >= 1) {
        // Capture each non-keeper's current alpha so xfade can continue fading them
        var numW = 10;
        nonKeeperAlphas = [];
        for (var _wi = 0; _wi < numW; _wi++) {
          if (_wi === 0 || _wi === numW - 1) { nonKeeperAlphas.push(0); continue; }
          var _fo = 1 - remap(1.0, 0.35, 0.85); // at introT=1
          nonKeeperAlphas.push(Math.max(0, _fo * 0.55));
        }
        // Capture amber ghost alpha for smooth fadeout in xfade
        amberFadeAlpha = remap(1.0, 0.4, 1) * 0.18;
        introActive  = false;
        xfadeActive  = true;
        xfadeT       = 0;
      }
    }
    if (xfadeActive) {
      xfadeT = Math.min(1, xfadeT + dt / XFADE_DUR);
      if (xfadeT >= 1) xfadeActive = false;
    }
    ghostDriftT += dt * 0.18; // very slow drift clock
    mainDriftT  += dt * 0.11; // slightly different speed — never in sync with ghost

    /* jitter (only after intro) */
    if (!introActive) {
      if (!jitterActive && t >= nextJitter) {
        jitterActive = true;
        jitterEnd    = t + 0.75 + Math.random() * 1.25;
        speedMul     = 2.5 + Math.random() * 2;
      }
      if (jitterActive && t >= jitterEnd) {
        jitterActive = false; speedMul = 1; scheduleNextJitter();
      }

      // wiggle pulse
      if (!wiggleActive && t >= nextWiggle) {
        wiggleActive = true;
        wiggleT      = 0;
        scheduleNextWiggle();
      }
      if (wiggleActive) {
        wiggleT += dt;
        if (wiggleT >= wiggleDur) wiggleActive = false;
      }
    }
    t += dt * (introActive ? 1.4 : speedMul);

    /* steady-state geometry */
    var maxAmp = h * 0.22;
    var amp    = maxAmp * (1 - sp);
    var cy     = h * 0.45 * (1 - sp);
    var mx     = mouseXNorm * w;

    /* ================================================================
       INTRO RENDERERS
       ================================================================ */
    if (introActive) {

      /* ── OPTION A: EXPLOSION ─────────────────────────────────────── */
      if (introMode === 'explosion') {
        var settle = easeOutQuint(introT);           // 0→1 calm
        var chaos  = 1 - settle;

        // Number of chaotic lines — shrinks from 8 to 1
        var numLines = Math.max(1, Math.round(8 - 7 * settle));
        for (var li = 0; li < numLines; li++) {
          var phase   = li * (Math.PI * 2 / 8);
          var freqMul = 1 + chaos * (3 + li * 0.7);
          var ampMul  = 1 + chaos * (2.5 - li * 0.2);
          var alphaMul = li === 0 ? 1 : chaos * (1 - li / numLines);

          ctx.beginPath();
          for (var x = 0; x <= w; x += 2) {
            var noiseBump = chaos * amp * 0.6 * Math.sin(x * 0.04 + t * 4 + phase);
            var y = cy
              + Math.sin(x * 0.007 * freqMul - t * freqMul + phase) * amp * ampMul
              + noiseBump;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          var glow = 0.08 + settle * 0.42;
          if (li === 0) {
            // main line brightens in
            ctx.strokeStyle = 'rgba(96,200,255,' + glow + ')';
            ctx.lineWidth   = 1 + settle * 0.4;
          } else {
            ctx.strokeStyle = 'rgba(96,200,255,' + (alphaMul * 0.3) + ')';
            ctx.lineWidth   = 0.5;
          }
          ctx.stroke();
        }

        // Ghost wave fades in
        if (settle > 0.3) {
          var ga = remap(settle, 0.3, 1) * 0.1;
          ctx.beginPath();
          for (var x = 0; x <= w; x += 3) {
            var lb = Math.exp(-Math.pow((x - mx) / (w * 0.25), 2)) * amp * 0.28;
            var y  = cy + Math.sin(x * 0.007 - t * 0.5 + 1.8) * amp * 0.45 + lb;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.strokeStyle = 'rgba(96,200,255,' + ga + ')';
          ctx.lineWidth   = 0.8;
          ctx.stroke();
        }

      /* ── OPTION B: STORM ─────────────────────────────────────────── */
      } else if (introMode === 'storm') {
        var numWaves  = 10;
        var settleQ   = easeOutCubic(introT);

        var palette = [
          [96,200,255],   // 0 ice       — keeper main
          [160,100,255],  // 1 violet
          [255,100,160],  // 2 rose
          [60,220,180],   // 3 teal
          [255,200,60],   // 4 gold
          [100,255,200],  // 5 mint
          [255,140,80],   // 6 coral
          [180,140,255],  // 7 lavender
          [80,220,255],   // 8 sky
          [184,118,26],   // 9 amber     — keeper ghost
        ];

        for (var wi = 0; wi < numWaves; wi++) {
          var wFrac    = wi / (numWaves - 1);
          var isKeeper = (wi === 0 || wi === numWaves - 1);

          var initPhase  = wFrac * Math.PI * 2;
          var finalPhase = wi === 0 ? 0.4 : 1.8;
          var curPhase   = isKeeper
            ? initPhase + (finalPhase - initPhase) * settleQ
            : initPhase;

          var initFreq  = 0.007 * (0.5 + wFrac * 2.2);
          var finalFreq = 0.007;
          var curFreq   = initFreq + (finalFreq - initFreq) * settleQ;

          // Each line has its own independent slow amplitude oscillation
          var wAmpMod = 0.55 + 0.45 * Math.sin(clock * (0.4 + wi * 0.17) + wi * 1.3);

          var wAlpha, wLineW, wGlowAmt;
          if (isKeeper) {
            wAlpha    = 0.08 + settleQ * 0.67;
            wLineW    = 0.8 + settleQ * 0.8;
            wGlowAmt  = 14 * settleQ;
            wAmpMod   = 1; // keepers use full amp so they land at correct steady position
          } else {
            var fadeIn  = remap(introT, 0, 0.18);
            var fadeOut = 1 - remap(introT, 0.55, 0.98);
            wAlpha      = fadeIn * fadeOut * 0.7;
            wLineW      = 0.9 + fadeIn * 0.5;
            // Glow bursts bright right after fade-in then settles — staggered per wave
            var burstPeak = remap(introT, wi * 0.02, wi * 0.02 + 0.15);
            var burstDecay = Math.max(0, 1 - remap(introT, wi * 0.02 + 0.1, 0.75));
            wGlowAmt  = (burstPeak * burstDecay) * 32 + fadeIn * fadeOut * 10;
          }
          if (wAlpha < 0.005) continue;

          var col = palette[wi % palette.length];
          ctx.beginPath();
          for (var x = 0; x <= w; x += (isKeeper ? 2 : 3)) {
            var lb = isKeeper
              ? Math.exp(-Math.pow((x - mx) / (w * 0.3), 2)) * amp * 0.42 * settleQ
              : 0;
            var y = cy + Math.sin(x * curFreq - t + curPhase) * amp * wAmpMod + lb;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + wAlpha + ')';
          ctx.lineWidth   = wLineW;
          if (wGlowAmt > 0.5) {
            ctx.shadowColor = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + Math.min(1, wAlpha * 1.4) + ')';
            ctx.shadowBlur  = wGlowAmt;
          }
          ctx.stroke();
          ctx.shadowBlur  = 0;
        }

        // Ghost sub-wave — amber, fades out well before intro ends so no xfade snap
        var curAmberAlpha = 0;
        if (introT > 0.4 && introT < 0.92) {
          var amberIn  = remap(introT, 0.4, 0.55);
          var amberOut = 1 - remap(introT, 0.65, 0.92); // fully gone by 92%
          curAmberAlpha = amberIn * amberOut * 0.18;
          ctx.beginPath();
          for (var x = 0; x <= w; x += 3) {
            var lb = Math.exp(-Math.pow((x - mx) / (w * 0.25), 2)) * amp * 0.28 * easeOutCubic(remap(introT,0.4,1));
            var y  = cy + Math.sin(x * 0.007 - t * 0.5 + 1.8) * amp * 0.45 + lb;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.strokeStyle = 'rgba(184,118,26,' + curAmberAlpha + ')';
          ctx.lineWidth   = 0.8;
          ctx.stroke();
          amberFadeAlpha  = curAmberAlpha;
        } else {
          amberFadeAlpha = 0; // already gone, nothing to carry into xfade
        }
      }

    /* ================================================================
       XFADE — continue fading non-keeper lines after intro ends
       ================================================================ */
    } else if (xfadeActive) {
      var xBlend = easeOutCubic(xfadeT);
      var xFade  = 1 - xBlend; // non-keepers go 1→0 as xBlend goes 0→1

      var paletteX = [
        [96,200,255],[160,100,255],[255,100,160],[60,220,180],[255,200,60],
        [100,255,200],[255,140,80],[180,140,255],[80,220,255],[184,118,26],
      ];
      var numWX = 10;

      for (var wi = 0; wi < numWX; wi++) {
        var wFracX    = wi / (numWX - 1);
        var isKeeperX = (wi === 0 || wi === numWX - 1);
        if (isKeeperX) continue;

        var startAlpha = (nonKeeperAlphas[wi] !== undefined) ? nonKeeperAlphas[wi] : 0.1;
        var wAlphaX = startAlpha * xFade;
        if (wAlphaX < 0.004) continue;

        var phaseX = wFracX * Math.PI * 2;
        var col = paletteX[wi % paletteX.length];
        // Each line keeps its own amplitude oscillation during fadeout
        var wAmpModX = 0.55 + 0.45 * Math.sin(clock * (0.4 + wi * 0.17) + wi * 1.3);

        ctx.beginPath();
        for (var x = 0; x <= w; x += 3) {
          var y = cy + Math.sin(x * 0.007 - t + phaseX) * amp * wAmpModX;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + wAlphaX + ')';
        ctx.lineWidth   = 0.8;
        ctx.shadowColor = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (wAlphaX * 0.7) + ')';
        ctx.shadowBlur  = 8 * xFade;
        ctx.stroke();
        ctx.shadowBlur  = 0;
      }

      // Amber ghost — fade out from captured alpha to zero
      if (amberFadeAlpha > 0.002) {
        var curAmberA = amberFadeAlpha * xFade;
        ctx.beginPath();
        for (var x = 0; x <= w; x += 3) {
          var lb = Math.exp(-Math.pow((x - mx) / (w * 0.25), 2)) * amp * 0.28;
          var y  = cy + Math.sin(x * 0.007 - t * 0.5 + 1.8) * amp * 0.45 + lb;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = 'rgba(184,118,26,' + curAmberA + ')';
        ctx.lineWidth   = 0.8;
        ctx.stroke();
      }

      // Keeper waves (steady state with xfade blend-in)
      if (amp > 0.5) {
        var ghostAmpMod = 0.65 + 0.35 * Math.sin(ghostDriftT);
        ctx.beginPath();
        for (var x = 0; x <= w; x += 3) {
          var lb = Math.exp(-Math.pow((x - mx) / (w * 0.25), 2)) * amp * 0.28;
          var y  = cy + Math.sin(x * 0.007 - t * 0.5 + 1.8) * amp * ghostAmpMod * 0.45 + lb;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = 'rgba(184,118,26,' + (0.18 * (1 - sp) * xBlend) + ')';
        ctx.lineWidth   = 0.8;
        ctx.stroke();

        var mainAmpMod = 0.72 + 0.28 * Math.sin(mainDriftT);
        ctx.beginPath();
        for (var x = 0; x <= w; x += 2) {
          var lb = Math.exp(-Math.pow((x - mx) / (w * 0.3), 2)) * amp * 0.42;
          var y  = cy + Math.sin(x * 0.007 - t + 0.4) * amp * mainAmpMod + lb;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        var wR = Math.round(96  + (30  - 96)  * sp);
        var wG = Math.round(200 + (37  - 200) * sp);
        var wB = Math.round(255 + (48  - 255) * sp);
        var wA = (0.75 - sp * 0.25) * xBlend;
        ctx.strokeStyle  = 'rgba(' + wR + ',' + wG + ',' + wB + ',' + wA + ')';
        ctx.lineWidth    = 1.4;
        ctx.shadowColor  = 'rgba(96,200,255,' + (0.45 * (1 - sp) * xBlend) + ')';
        ctx.shadowBlur   = 10 * (1 - sp) * xBlend;
        ctx.stroke();
        ctx.shadowBlur   = 0;
      }

    /* ================================================================
       STEADY STATE (fully settled, post-xfade)
       ================================================================ */
    } else {
      var xBlend = 1;

      if (amp > 0.5) {
        // Ghost wave — amplitude drifts slowly between 0.3× and 1× via a slow sine
        var ghostAmpMod = 0.65 + 0.35 * Math.sin(ghostDriftT);
        var ghostAlpha  = 0.18 * (1 - sp);

        ctx.beginPath();
        for (var x = 0; x <= w; x += 3) {
          var lb = Math.exp(-Math.pow((x - mx) / (w * 0.25), 2)) * amp * 0.28;
          var y  = cy + Math.sin(x * 0.007 - t * 0.5 + 1.8) * amp * ghostAmpMod * 0.45 + lb;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = 'rgba(184,118,26,' + ghostAlpha + ')';
        ctx.lineWidth   = 0.8;
        ctx.stroke();

        // Main wave — drifts at a different speed to ghost, never in sync
        var mainAmpMod = 0.72 + 0.28 * Math.sin(mainDriftT);
        ctx.beginPath();
        for (var x = 0; x <= w; x += 2) {
          var lb = Math.exp(-Math.pow((x - mx) / (w * 0.3), 2)) * amp * 0.42;
          var wiggleBump = 0;
          if (wiggleActive) {
            var wEnv = Math.sin(Math.PI * (wiggleT / wiggleDur));
            wiggleBump = wEnv * wiggleAmpScale * amp * 0.5
              * Math.sin(x * wiggleFreq - t * 6 + 0.4);
          }
          var y = cy + Math.sin(x * 0.007 - t + 0.4) * amp * mainAmpMod + lb + wiggleBump;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        var wR = Math.round(96  + (30  - 96)  * sp);
        var wG = Math.round(200 + (37  - 200) * sp);
        var wB = Math.round(255 + (48  - 255) * sp);
        var wA = 0.75 - sp * 0.25;
        ctx.strokeStyle  = 'rgba(' + wR + ',' + wG + ',' + wB + ',' + wA + ')';
        ctx.lineWidth    = 1.4;
        ctx.shadowColor  = 'rgba(96,200,255,' + (0.45 * (1 - sp)) + ')';
        ctx.shadowBlur   = 10 * (1 - sp);
        ctx.stroke();
        ctx.shadowBlur   = 0;
      }

      // Flat line collapse → nav border handoff
      if (sp > 0.6) {
        var la = Math.min(1, (sp - 0.6) / 0.4);
        ctx.beginPath();
        ctx.moveTo(0, cy); ctx.lineTo(w, cy);
        var gR = Math.round(30  + (96  - 30)  * la);
        var gG = Math.round(37  + (200 - 37)  * la);
        var gB = Math.round(48  + (255 - 48)  * la);
        ctx.strokeStyle = 'rgba(' + gR + ',' + gG + ',' + gB + ',' + la + ')';
        ctx.lineWidth   = 1 + la;
        if (la > 0.3) { ctx.shadowColor = 'rgba(96,200,255,' + la * 0.6 + ')'; ctx.shadowBlur = 8 * la; }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    ctx.restore();
    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
}
</script>
