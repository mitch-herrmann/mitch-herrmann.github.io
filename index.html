<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitchell Herrmann | Systems & Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&family=Chivo+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d0f14;
  --bg2:    #13161c;
  --bg3:    #1a1e26;
  --line:   #1e2530;
  --ice:    #60c8ff;
  --ice2:   #90dcff;
  --text:   #e8edf5;
  --muted:  #7a8a9e;
  --dim:    #38445a;
  --display: 'Syne', sans-serif;
  --mono:    'Syne Mono', monospace;
  --body:    'Chivo Mono', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--body); min-height: 100vh; overflow-x: hidden;
}

/* PERFORMANCE: Hardware-accelerated grain */
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW17e3t1dXVtbW1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mz1mzm6NDX0AAAAB3RSTlMAb00zZmbm77Yf6AAAAEFJREFUeNrtwQENYAAAsLB8pB/HBEfSpEn9pEmT+kmTJvWTJk3qJ02a1E+aNKmfNGlSP2nSpH7SpEn9pEn9pEnTfAn4AnGisS8ZAAAAAElFTkSuQmCC");
  opacity: 0.05; pointer-events: none; z-index: 9999;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 50% 35% at 0% 100%, rgba(96,200,255,.03) 0%, transparent 70%),
    radial-gradient(ellipse 40% 25% at 100% 0%,  rgba(96,200,255,.02) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 60px;
  background: rgba(13,15,20,.94); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
nav.waveform-active {
  border-bottom-color: var(--ice);
  box-shadow: 0 0 20px rgba(96,200,255,.15);
}
.nav-logo {
  font-family: var(--display); font-size: 13px; font-weight: 800;
  letter-spacing: -.01em; color: var(--text);
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.logo-orb-wrap {
  position: relative; display: flex; align-items: center;
  justify-content: center; width: 16px; height: 16px; flex-shrink: 0;
}
.logo-orb-wrap::before {
  content: ''; position: absolute; width: 16px; height: 16px;
  border-radius: 50%; border: 1px solid rgba(96,200,255,.25);
  animation: ringpulse 3s ease-in-out infinite;
}
@keyframes ringpulse {
  0%,100% { transform: scale(1); opacity: .5; }
  50%      { transform: scale(2); opacity: 0; }
}
.logo-orb {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #d0e8ff, #60c8ff 40%, #1a3050 100%);
  box-shadow: 0 0 10px rgba(96,200,255,.5), inset 0 1px 1px rgba(255,255,255,.4);
  animation: orbpulse 3s ease-in-out infinite; position: relative; z-index: 1;
}
@keyframes orbpulse {
  0%,100% { box-shadow: 0 0 10px rgba(96,200,255,.5), inset 0 1px 1px rgba(255,255,255,.4); }
  50%      { box-shadow: 0 0 20px rgba(96,200,255,.75), inset 0 1px 1px rgba(255,255,255,.5); }
}
.nav-links {
  display: flex; gap: 6px;
  font-family: var(--display); font-size: 8.5px;
  font-weight: 700; letter-spacing: .15em; text-transform: uppercase;
}
.nav-links a {
  padding: 5px 14px; border-radius: 99px; border: 1px solid var(--line);
  color: var(--dim); text-decoration: none; white-space: nowrap;
  transition: all .25s ease;
}
.nav-links a.illuminated {
  background: linear-gradient(135deg, #1e2d3d, #162230);
  color: var(--ice2); border-color: rgba(96,200,255,.35);
  box-shadow: 0 0 12px rgba(96,200,255,.18), inset 0 1px 0 rgba(96,200,255,.08);
}

/* HERO */
.hero {
  position: relative; z-index: 3; min-height: 100vh;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 0 48px 80px; border-bottom: 1px solid var(--line);
}
#waveCanvas {
  position: fixed; top: 60px; left: 0; width: 100%;
  pointer-events: none; z-index: 2;
  will-change: transform;
}
.hero-orb-backdrop {
  position: absolute; bottom: 60px; right: -100px;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(96,200,255,.08) 0%, rgba(96,200,255,.02) 30%, transparent 70%);
  pointer-events: none; filter: blur(40px); z-index: 0;
}
.hero-monogram {
  position: absolute; bottom: -60px; right: -20px;
  font-family: var(--display); font-size: clamp(200px, 28vw, 420px);
  font-weight: 800; line-height: 1; letter-spacing: -.08em;
  color: rgba(232,237,245,.03); pointer-events: none;
  user-select: none; white-space: nowrap;
}
.hero-eyebrow {
  font-family: var(--mono); font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px;
  animation: fadeUp .6s .1s ease both;
}
.hero-eyebrow::before {
  content: ''; display: inline-block; width: 32px; height: 1px;
  background: var(--dim); opacity: .8;
}
.hero-name {
  font-family: var(--display); font-size: clamp(60px, 8vw, 120px);
  font-weight: 800; line-height: .88; letter-spacing: -.04em;
  color: var(--text); margin-bottom: 40px; position: relative; z-index: 3;
}
.hero-name .char {
  display: inline-block; opacity: 0; transform: translateY(22px);
  animation: charIn .55s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes charIn { to { opacity: 1; transform: translateY(0); } }

.hero-bottom {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 40px; animation: fadeUp .6s .5s ease both; position: relative; z-index: 3;
}
.hero-tagline {
  font-family: var(--display); font-size: 11px; font-variant: small-caps;
  letter-spacing: .09em; color: var(--muted); line-height: 1.85; max-width: 420px;
}
.hero-meta {
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 8px; font-family: var(--mono); font-size: 9px;
  color: var(--dim); text-align: right; flex-shrink: 0; padding-bottom: 4px;
}
.hero-meta strong { color: var(--muted); font-weight: 400; }

.scroll-hint {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 8px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--dim);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: fadeUp .5s .9s ease both;
}
.scroll-hint::after {
  content: ''; width: 1px; height: 36px;
  background: linear-gradient(to bottom, var(--dim), transparent);
  animation: scrolldown 1.9s ease-in-out infinite;
}
@keyframes scrolldown { 0%,100% { opacity: .3; } 50% { opacity: .8; } }

/* FILTER BAR */
.filter-bar {
  position: sticky; top: 60px; z-index: 100;
  display: flex; align-items: center; padding: 0 48px;
  border-bottom: 1px solid var(--line);
  background: rgba(13,15,20,.97); backdrop-filter: blur(16px);
  overflow-x: auto;
}
.filter-btn {
  padding: 18px 0; margin-right: 32px; font-family: var(--display);
  font-size: 8.5px; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; color: var(--dim); background: none;
  border: none; cursor: pointer; position: relative; white-space: nowrap;
}
.filter-btn::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--ice);
  transform: scaleX(0); transition: transform .25s ease;
}
.filter-btn.active { color: var(--text); }
.filter-btn.active::after { transform: scaleX(1); }

/* WORK INDEX */
.work-index { display: grid; grid-template-columns: 1fr; border-bottom: 1px solid var(--line); }
.work-row {
  display: grid; grid-template-columns: 72px 1fr auto; align-items: center;
  border-top: 1px solid var(--line); border-left: 2px solid transparent;
  cursor: pointer; text-decoration: none; color: inherit;
  position: relative; overflow: hidden;
  transition: all .25s ease;
}
.work-row:hover { border-left-color: var(--ice); background: rgba(19,22,28,.8); }
.work-row:hover .row-title { opacity: 1; transform: translateX(6px); }

.row-num { padding: 32px 0 32px 48px; font-family: var(--mono); font-size: 10px; color: var(--dim); }
.row-body { padding: 32px 32px; }
.row-title {
  font-family: var(--display); font-size: clamp(24px, 3.2vw, 44px);
  font-weight: 800; letter-spacing: -.025em; color: var(--text);
  line-height: 1; opacity: .6; margin-bottom: 10px;
  transition: opacity .25s, transform .3s ease-out;
}
.row-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.row-tag {
  font-family: var(--display); font-size: 7px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; padding: 3px 10px;
  border-radius: 99px; border: 1px solid var(--line); color: var(--dim);
}
.row-right { padding: 32px 48px 32px 32px; display: flex; align-items: center; gap: 20px; }
.row-year { font-family: var(--mono); font-size: 9px; color: var(--dim); }

/* FOOTER */
footer { padding: 28px 48px; display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; color: var(--dim); }
.footer-links { display: flex; gap: 24px; }
.footer-links a { color: var(--dim); text-decoration: none; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav id="mainNav">
  <a href="#" class="nav-logo">
    <div class="logo-orb-wrap"><div class="logo-orb"></div></div>
    <span id="navName"> Mitchell Herrmann</span>
  </a>
  <div class="nav-links">
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a id="navContact" href="#">Contact</a>
  </div>
</nav>

<canvas id="waveCanvas"></canvas>

<div class="hero">
  <div class="hero-orb-backdrop"></div>
  <div class="hero-monogram">MH</div>
  <div class="hero-eyebrow">Engineer · Trader · Photographer</div>
  <div class="hero-name" id="heroName">Mitchell<br>Herrmann</div>
  <div class="hero-bottom">
    <div class="hero-tagline">Developing low-latency financial systems and precision creative workflows.</div>
    <div class="hero-meta" id="heroMeta"></div>
  </div>
  <div class="scroll-hint">Scroll</div>
</div>

<div class="filter-bar" id="work">
  <button class="filter-btn active" onclick="filterWork('all',this)">All</button>
  <button class="filter-btn" onclick="filterWork('finance',this)">Finance</button>
  <button class="filter-btn" onclick="filterWork('engineering',this)">Engineering</button>
</div>

<div class="work-section">
  <div class="work-index" id="workIndex"></div>
</div>

<footer>
  <span id="footerCopy"></span>
  <div class="footer-links" id="footerLinks"></div>
</footer>

<script>
/* =====================================================================
    CONFIG & CONTENT
   ===================================================================== */
const siteData = {
  intro_animation: "storm", // Options: "storm", "explosion", "none"
  nav: { email: "m@mitchellherrmann.dev" },
  hero: { location: "Denver, CO", focus: "Quant Finance · Systems", status: "Operational" },
  projects: [
    { num:'01', title:'Schwab Bot / SPY Options', tags:['Python','REST','WebSocket'], year:'2026', cat:'finance', url:'#' },
    { num:'02', title:'Kalman Velocity Filter', tags:['NumPy','Signals'], year:'2026', cat:'engineering', url:'#' },
    { num:'03', title:'RAW Workflow Engine', tags:['Image Processing','Lightroom'], year:'2025', cat:'engineering', url:'#' }
  ],
  footer: { github: "#", linkedin: "#", email: "m@mitchellherrmann.dev" }
};

/* =====================================================================
    PAGE INIT
   ===================================================================== */
function initPage() {
  const meta = document.getElementById('heroMeta');
  meta.innerHTML = `<span><strong>Location</strong> ${siteData.hero.location}</span>` +
                   `<span><strong>Focus</strong> ${siteData.hero.focus}</span>` +
                   `<span><strong>Status</strong> ${siteData.hero.status}</span>`;

  const idx = document.getElementById('workIndex');
  siteData.projects.forEach(p => {
    const row = document.createElement('a');
    row.className = 'work-row'; row.dataset.cat = p.cat; row.href = p.url;
    row.innerHTML = `<div class="row-num">${p.num}</div><div class="row-body"><div class="row-title">${p.title}</div>
      <div class="row-tags">${p.tags.map(t => `<span class="row-tag">${t}</span>`).join('')}</div></div>
      <div class="row-right"><span class="row-year">${p.year}</span></div>`;
    idx.appendChild(row);
  });

  const nameEl = document.getElementById('heroName');
  const lines = nameEl.innerHTML.split('<br>');
  nameEl.innerHTML = lines.map(l => l.split('').map((c, i) => 
    c === ' ' ? ' ' : `<span class="char" style="animation-delay:${(0.28 + i*0.04)}s">${c}</span>`).join('')).join('<br>');

  document.getElementById('footerCopy').textContent = `© ${new Date().getFullYear()} Mitchell Herrmann`;
}

function filterWork(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.work-row').forEach(r => {
    r.style.display = (cat === 'all' || r.dataset.cat === cat) ? 'grid' : 'none';
  });
}

/* =====================================================================
    PERFORMANCE WAVE ENGINE (Storm/Explosion Enabled)
   ===================================================================== */
function initWave(mode) {
  const canvas = document.getElementById('waveCanvas');
  const nav = document.getElementById('mainNav');
  const ctx = canvas.getContext('2d', { alpha: true });
  const dpr = window.devicePixelRatio || 1;
  let w, h, targetSp = 0, currentSp = 0, clock = 0, t = 0;

  // Intro State
  const INTRO_DUR = 4.5;
  let introActive = (mode !== 'none');
  let introT = 0;

  function resize() {
    w = window.innerWidth; h = window.innerHeight - 60;
    canvas.width = w * dpr; canvas.height = h * dpr;
    ctx.scale(dpr, dpr);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('scroll', () => {
    targetSp = Math.min(1, window.scrollY / (window.innerHeight * 0.5));
  }, { passive: true });

  function remap(v, a, b) { return Math.min(1, Math.max(0, (v - a) / (b - a))); }
  function easeOutQuint(x) { return 1 - Math.pow(1 - x, 5); }

  function draw() {
    currentSp += (targetSp - currentSp) * 0.1;
    if (currentSp >= 0.98) nav.classList.add('waveform-active');
    else nav.classList.remove('waveform-active');

    ctx.clearRect(0, 0, w, h);
    clock += 0.016; // Consistent step
    if (introActive) {
      introT = Math.min(1, clock / INTRO_DUR);
      if (introT >= 1) introActive = false;
    }
    t += 0.018;

    const amp = h * 0.22 * (1 - currentSp);
    const cy = h * 0.45 * (1 - currentSp);

    if (introActive && mode === 'storm') {
      const numLines = 8;
      const settle = easeOutQuint(introT);
      for (let i = 0; i < numLines; i++) {
        const isMain = i === 0;
        const alpha = isMain ? (0.1 + settle * 0.5) : (1 - remap(introT, 0.4, 0.95)) * 0.3;
        if (alpha <= 0) continue;

        ctx.beginPath();
        ctx.strokeStyle = `rgba(96, 200, 255, ${alpha})`;
        ctx.lineWidth = isMain ? 1.2 : 0.6;
        
        const freq = 0.006 * (1 + (1 - settle) * (i * 0.5));
        const phase = i * (Math.PI * 2 / numLines) * (1 - settle);

        for (let x = 0; x <= w; x += 5) {
          const y = cy + Math.sin(x * freq + t + phase) * amp * (1 + (1-settle)*i*0.2);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    } else if (introActive && mode === 'explosion') {
      const settle = easeOutQuint(introT);
      const chaos = 1 - settle;
      ctx.beginPath();
      ctx.strokeStyle = `rgba(96, 200, 255, ${0.1 + settle * 0.4})`;
      for (let x = 0; x <= w; x += 5) {
        const noise = Math.sin(x * 0.05 + t * 5) * amp * 0.5 * chaos;
        const y = cy + Math.sin(x * 0.006 + t) * amp + noise;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    } else {
      // Steady State
      ctx.beginPath();
      ctx.strokeStyle = `rgba(96, 200, 255, ${0.1 + currentSp * 0.4})`;
      for (let x = 0; x <= w; x += 4) {
        const y = cy + Math.sin(x * 0.006 + t) * amp;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    requestAnimationFrame(draw);
  }

  resize();
  draw();
}

window.onload = () => {
  initPage();
  setTimeout(() => initWave(siteData.intro_animation), 100);
};
</script>
</body>
</html>
