<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Chivo+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0d0f14;
    --line: #1e2530;
    --ice: #60c8ff;
    --text: #e8edf5;
    --muted: #7a8a9e;
    --dim: #38445a;
    --display: 'Syne', sans-serif;
    --mono: 'Chivo Mono', monospace;
}

/* Base Styling & Efficiency */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    background: var(--bg); color: var(--text); 
    font-family: var(--mono); overflow-x: hidden; 
    -webkit-font-smoothing: antialiased;
}

canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

/* Content Layout */
nav {
    position: fixed; top: 0; width: 100%; height: 70px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 50px; z-index: 100; backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
}

.hero {
    position: relative; height: 100vh; display: flex; flex-direction: column;
    justify-content: center; padding: 0 10%; z-index: 10;
}

.hero-name {
    font-family: var(--display); font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 800; line-height: 0.9; letter-spacing: -0.04em;
}

.hero-tagline { 
    margin-top: 20px; max-width: 500px; color: var(--muted); font-size: 1rem; 
}

/* Project Index */
.work-index { margin-top: 100px; border-top: 1px solid var(--line); z-index: 10; position: relative; }
.work-row {
    display: grid; grid-template-columns: 80px 1fr 120px;
    padding: 40px 50px; border-bottom: 1px solid var(--line);
    text-decoration: none; color: inherit; transition: background 0.3s;
}

/* Performance Pop: Hover Glows */
.work-row:hover { background: rgba(255, 255, 255, 0.02); }
.work-row:hover .row-title { color: var(--ice); text-shadow: 0 0 15px var(--ice); }

.row-tag {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--line); font-size: 0.7rem; color: var(--dim);
    margin-right: 8px; transition: all 0.4s;
}

/* Skill Glow Effect */
.row-tag:hover {
    border-color: #ff00ff; color: #fff;
    box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
    background: rgba(255, 0, 255, 0.1);
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.animate { animation: fadeIn 0.8s forwards; }

</style>
</head>
<body>

<nav>
    <div style="font-family: var(--display); font-weight: 800;" id="navTitle">...</div>
    <div style="font-size: 0.8rem; color: var(--dim);">2026 • PORTFOLIO</div>
</nav>

<canvas id="waveCanvas"></canvas>

<div class="hero">
    <div class="hero-eyebrow" id="heroEyebrow" style="font-size: 0.7rem; color: var(--ice); letter-spacing: 0.2em; text-transform: uppercase;">...</div>
    <h1 class="hero-name" id="heroName">...</h1>
    <p class="hero-tagline" id="heroTagline">...</p>
</div>

<div class="work-index" id="workIndex">
    </div>

<script>
/** * PERFORMANCE & VISUAL ENGINE
 * - Restores Amplitude/Speed/Jitter
 * - Multi-colored intro storm
 * - Pulls from content.json
 */

const state = {
    clock: 0,
    introProgress: 0,
    introDuration: 240, // frames (~4s)
    isIntro: true,
    colors: ['#ff0055', '#00ffcc', '#ffcc00', '#9d00ff', '#60c8ff']
};

async function init() {
    try {
        const response = await fetch('content.json');
        const data = await response.json();
        
        // Populate content
        document.getElementById('navTitle').innerText = data.site.title;
        document.getElementById('heroEyebrow').innerText = data.hero.eyebrow;
        document.getElementById('heroName').innerText = data.site.title;
        document.getElementById('heroTagline').innerText = data.hero.tagline;

        const workIdx = document.getElementById('workIndex');
        data.projects.forEach(p => {
            const row = document.createElement('a');
            row.href = p.url;
            row.className = 'work-row';
            row.innerHTML = `
                <div style="color: var(--dim)">${p.num}</div>
                <div>
                    <div class="row-title" style="font-family: var(--display); font-size: 2rem; transition: 0.3s;">${p.title}</div>
                    <div style="margin-top: 10px;">${p.tags.map(t => `<span class="row-tag">${t}</span>`).join('')}</div>
                </div>
                <div style="text-align: right; color: var(--dim)">${p.year}</div>
            `;
            workIdx.appendChild(row);
        });

        initWaveform();
    } catch (err) {
        console.error("Content loading failed:", err);
    }
}

function initWaveform() {
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    let w, h;

    const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);
    };
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.clearRect(0, 0, w, h);
        state.clock += 0.01;
        
        if (state.isIntro) {
            state.introProgress += 1;
            if (state.introProgress > state.introDuration) state.isIntro = false;
        }

        const centerY = h * 0.5;
        const progress = Math.min(1, state.introProgress / state.introDuration);
        
        // DRAW INTRO LINES (Multi-color squiggles)
        if (state.isIntro) {
            state.colors.forEach((color, i) => {
                const alpha = (1 - progress) * 0.6;
                const offset = i * 40;
                
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
                ctx.globalAlpha = alpha;

                for (let x = 0; x < w; x += 5) {
                    // Chaotic intro movement
                    const noise = Math.sin(x * 0.01 + state.clock * 5 + i) * 50;
                    const y = centerY + Math.sin(x * 0.005 + state.clock * 2 + i) * (150 * (1 - progress)) + noise;
                    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.stroke();
            });
        }

        // DRAW MAIN LINE (The persistent blue waveform)
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.strokeStyle = varToHex('--ice');
        ctx.lineWidth = 2;
        ctx.shadowBlur = 20;
        ctx.shadowColor = 'rgba(96, 200, 255, 0.5)';

        // RESTORED PHYSICS: Amplitude, Speed, and Jitter
        const baseAmp = 40; 
        const speed = state.isIntro ? 10 : 2.5;
        const jitterFreq = state.isIntro ? 0.05 : 0.01;
        
        for (let x = 0; x < w; x += 2) {
            // Breathing Amplitude modulation
            const breathing = Math.sin(state.clock * 0.5) * 10;
            
            // Jitter: High-frequency interference
            const jitter = Math.sin(x * jitterFreq + state.clock * 15) * 2;
            
            // Core Sine Wave
            const y = centerY + Math.sin(x * 0.004 + state.clock * speed) * (baseAmp + breathing) + jitter;
            
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();

        requestAnimationFrame(draw);
    }

    // Utility to get CSS variables
    function varToHex(varName) {
        return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    draw();
}

init();
</script>
</body>
</html>
