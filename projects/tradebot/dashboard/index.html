<style>
:root {
  --bg:      #0c0e13;
  --bg2:     #12151b;
  --bg3:     #181c24;
  --line:    #1c2230;
  --ice:     #60c8ff;
  --ice2:    #90dcff;
  --text:    #e6ecf4;
  --muted:   #7888a0;
  --dim:     #36445a;
  --green:   #38c99a;
  --display: 'Syne', sans-serif;
  --mono:    'Syne Mono', monospace;
  --body:    'Chivo Mono', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--body); min-height: 100vh;
  overflow-x: hidden; display: flex; flex-direction: column;
}

/* ── NOISE + GLOW OVERLAYS ── */
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 60%, rgba(96,200,255,.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 20% 20%, rgba(96,200,255,.02) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 60px;
  background: rgba(13,15,20,.94); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
}
.nav-monogram {
  position: relative; cursor: pointer; user-select: none;
  font-family: var(--display); font-size: 18px; font-weight: 800;
  letter-spacing: -.02em; color: var(--text); padding: 6px 2px;
  transition: color .2s;
}
.nav-monogram:hover { color: var(--ice2); }
.nav-monogram-arrow {
  display: inline-block; margin-left: 5px; font-size: 9px; color: var(--dim);
  transition: transform .25s ease, color .2s; vertical-align: middle; line-height: 1;
}
.nav-monogram.open .nav-monogram-arrow { transform: rotate(180deg); color: var(--muted); }
.nav-dropdown {
  position: absolute; top: calc(100% + 8px); left: 0;
  background: rgba(13,15,20,.97); backdrop-filter: blur(24px);
  border: 1px solid var(--line); border-radius: 10px;
  padding: 8px 0; min-width: 260px;
  opacity: 0; transform: translateY(-8px) scale(.97); pointer-events: none;
  transition: opacity .22s ease, transform .25s cubic-bezier(.16,1,.3,1); z-index: 300;
}
.nav-monogram.open .nav-dropdown {
  opacity: 1; transform: translateY(0) scale(1); pointer-events: all;
}
.nav-dropdown-main { display: block; }
.nav-dropdown-main a {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 28px;
  font-family: var(--display); font-size: 17px; font-weight: 800;
  letter-spacing: -.02em;
  color: rgba(232,237,245,.22); text-decoration: none;
  border-left: 2px solid transparent;
  transition: color .18s ease, border-left-color .18s ease, background .18s ease;
  position: relative;
}
.nav-dropdown-main > a:hover { background: rgba(255,255,255,.03); }
.nav-dropdown-main > a:nth-child(1):hover { color: #60c8ff; border-left-color: #60c8ff; }
.nav-dropdown-main > a:nth-child(2):hover { color: #ff64a0; border-left-color: #ff64a0; }
.nav-dropdown-main > a:nth-child(3):hover { color: #a064ff; border-left-color: #a064ff; }
.nav-dropdown-main > a:nth-child(4):hover { color: #3cdcb4; border-left-color: #3cdcb4; }
.nav-dropdown-main > a:nth-child(5):hover { color: #ffc83c; border-left-color: #ffc83c; }
.nav-dropdown-main > a:nth-child(1) { border-bottom: 1px solid var(--line); margin-bottom: 4px; }
.nav-dropdown-main a.photo-row-active { color: #a064ff !important; border-left-color: #a064ff !important; }
.nav-dropdown-num {
  font-family: var(--mono); font-size: 8px; color: var(--dim);
  letter-spacing: .14em; font-weight: 400;
}
.nav-dropdown-chevron {
  font-size: 8px; color: var(--dim); margin-left: 4px;
  transition: transform .25s ease, color .2s; display: inline-block;
}
.nav-dropdown-main a.photo-row-active .nav-dropdown-chevron { transform: rotate(90deg); color: #a064ff; }
.nav-album-list {
  max-height: 0; overflow: hidden;
  transition: max-height .3s cubic-bezier(.16,1,.3,1);
  border-left: 2px solid rgba(160,100,255,.25);
  margin: 0 28px 0 30px;
}
.nav-album-list.open { max-height: 400px; }
.nav-album-list a {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0 7px 14px;
  font-family: var(--display); font-size: 12px; font-weight: 800;
  letter-spacing: -.01em; color: rgba(232,237,245,.3);
  text-decoration: none; border-left: none;
  transition: color .15s ease;
}
.nav-album-list a::before { content: '›'; font-size: 11px; color: var(--dim); transition: color .15s ease; }
.nav-album-list a:hover { color: #a064ff; }
.nav-album-list a:hover::before { color: #a064ff; }
.nav-album-list-spacer { height: 6px; }
.nav-links {
  display: flex; gap: 8px; font-family: var(--display); font-size: 9.5px;
  font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
}
.nav-links a {
  padding: 6px 16px; border-radius: 99px; border: 1px solid var(--line);
  color: var(--dim); text-decoration: none; white-space: nowrap;
  transition: color .25s, border-color .25s, background .25s, box-shadow .25s;
}
.nav-links:hover a { opacity: 0.4; }
.nav-links a:hover { opacity: 1 !important; color: var(--muted); border-color: var(--dim); }
.nav-links a.active { color: var(--text); animation: pill-cycle 8s linear infinite; }
@keyframes pill-cycle {
  0%   { border-color:rgba(96,200,255,.42);  box-shadow:inset 0 1px 0 rgba(96,200,255,.12), 0 0 14px rgba(96,200,255,.14);  background:rgba(96,200,255,.10); }
  14%  { border-color:rgba(160,100,255,.42); box-shadow:inset 0 1px 0 rgba(160,100,255,.12),0 0 14px rgba(160,100,255,.14); background:rgba(160,100,255,.10); }
  28%  { border-color:rgba(255,100,160,.42); box-shadow:inset 0 1px 0 rgba(255,100,160,.12),0 0 14px rgba(255,100,160,.14); background:rgba(255,100,160,.10); }
  42%  { border-color:rgba(60,220,180,.42);  box-shadow:inset 0 1px 0 rgba(60,220,180,.12), 0 0 14px rgba(60,220,180,.14);  background:rgba(60,220,180,.10); }
  56%  { border-color:rgba(255,200,60,.42);  box-shadow:inset 0 1px 0 rgba(255,200,60,.12), 0 0 14px rgba(255,200,60,.14);  background:rgba(255,200,60,.10); }
  70%  { border-color:rgba(255,140,80,.42);  box-shadow:inset 0 1px 0 rgba(255,140,80,.12), 0 0 14px rgba(255,140,80,.14);  background:rgba(255,140,80,.10); }
  84%  { border-color:rgba(80,220,255,.42);  box-shadow:inset 0 1px 0 rgba(80,220,255,.12), 0 0 14px rgba(80,220,255,.14);  background:rgba(80,220,255,.10); }
  100% { border-color:rgba(96,200,255,.42);  box-shadow:inset 0 1px 0 rgba(96,200,255,.12), 0 0 14px rgba(96,200,255,.14);  background:rgba(96,200,255,.10); }
}
.nav-page-label {
  display: none;
  font-family: var(--mono); font-size: 9px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--dim);
  margin-left: 10px; vertical-align: middle;
}
.nav-status { display: none; }
.nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: dotpulse 2.2s ease-in-out infinite; }
@keyframes dotpulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

/* ── MAIN CONTENT ── */
main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 120px 48px 80px; position: relative; z-index: 1;
  min-height: 100vh;
}

/* ── DASHBOARD WIREFRAME ── */
.dash-ghost {
  width: min(820px, 90vw);
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  opacity: .28;
  margin-bottom: 64px;
  box-shadow: 0 0 80px rgba(96,200,255,.06), 0 24px 64px rgba(0,0,0,.5);
  pointer-events: none;
  animation: ghost-breathe 4s ease-in-out infinite;
}
@keyframes ghost-breathe {
  0%, 100% { opacity: .28; }
  50%       { opacity: .38; }
}

/* ghost nav bar */
.ghost-nav {
  height: 38px; background: var(--bg3);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
}
.ghost-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); }
.ghost-dot.lit { background: var(--ice); box-shadow: 0 0 6px var(--ice); animation: ghost-pulse 2s ease-in-out infinite; }
@keyframes ghost-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.ghost-nav-right { display: flex; gap: 8px; align-items: center; }
.ghost-pill { height: 16px; border-radius: 99px; background: var(--line); }

/* ghost kpi row */
.ghost-kpi { display: grid; grid-template-columns: repeat(5,1fr); border-bottom: 1px solid var(--line); }
.ghost-kpi-cell { padding: 10px 12px; border-right: 1px solid var(--line); }
.ghost-kpi-cell:last-child { border-right: none; }
.ghost-label { height: 6px; border-radius: 3px; background: var(--line); margin-bottom: 7px; }
.ghost-value { height: 18px; border-radius: 3px; background: var(--dim); }

/* ghost chart row */
.ghost-body { display: grid; grid-template-columns: 1fr 120px; }
.ghost-chart-area { padding: 14px; border-right: 1px solid var(--line); }
.ghost-chart-bar-row { display: flex; align-items: flex-end; gap: 3px; height: 72px; margin-bottom: 10px; }
.ghost-bar { flex: 1; border-radius: 2px 2px 0 0; background: var(--line); }
.ghost-line-row { height: 40px; position: relative; overflow: hidden; }
.ghost-line-row::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, var(--dim) 50%, transparent 100%);
  border-radius: 2px; height: 1px; top: 50%;
  animation: ghost-scan 3s linear infinite;
}
@keyframes ghost-scan { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

/* ghost sidebar */
.ghost-sidebar { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.ghost-sb-block { background: var(--bg3); border-radius: 6px; padding: 10px; }
.ghost-sb-num { height: 22px; border-radius: 3px; background: var(--dim); margin-bottom: 5px; }
.ghost-sb-lbl { height: 6px; border-radius: 3px; background: var(--line); }

/* ghost table */
.ghost-table { border-top: 1px solid var(--line); }
.ghost-row { display: flex; gap: 8px; padding: 7px 14px; border-bottom: 1px solid rgba(28,34,48,.6); align-items: center; }
.ghost-row:last-child { border-bottom: none; }
.ghost-cell { height: 7px; border-radius: 3px; background: var(--line); flex-shrink: 0; }
.ghost-cell.green { background: rgba(56,201,154,.25); }
.ghost-cell.red   { background: rgba(255,64,96,.2); }

/* ── COPY ── */
.cs-lockup { text-align: center; }
.cs-eyebrow {
  font-family: var(--mono); font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center; gap: 14px;
}
.cs-eyebrow::before, .cs-eyebrow::after {
  content: ''; display: inline-block; width: 32px; height: 1px; background: var(--dim); opacity: .6;
}
.cs-title {
  font-family: var(--display); font-size: clamp(36px, 6vw, 72px);
  font-weight: 800; letter-spacing: -.04em; line-height: .92;
  color: var(--text); margin-bottom: 20px;
}
.cs-title .accent { color: transparent; -webkit-text-stroke: 1.5px var(--ice); }
.cs-desc {
  font-family: var(--body); font-size: 13px; line-height: 1.85;
  color: var(--muted); max-width: 480px; margin: 0 auto 36px;
}
.cs-back {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 11px 28px; border-radius: 99px;
  border: 1px solid rgba(96,200,255,.3);
  background: rgba(96,200,255,.07);
  color: var(--ice2); font-family: var(--display); font-size: 9px;
  font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  text-decoration: none; transition: background .2s, border-color .2s, box-shadow .2s;
}
.cs-back:hover {
  background: rgba(96,200,255,.14);
  border-color: rgba(96,200,255,.55);
  box-shadow: 0 0 20px rgba(96,200,255,.14);
}

/* ── SCAN LINE ── (subtle animated horizontal rule) */
.cs-scan {
  width: min(820px, 90vw); height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--ice) 40%, var(--ice2) 60%, transparent 100%);
  opacity: 0; margin-bottom: 56px;
  animation: scan-in 1.2s .4s forwards;
}
@keyframes scan-in { to { opacity: .18; } }

/* ── MOBILE ── */
@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  main { padding: 100px 20px 60px; }
  .ghost-kpi { grid-template-columns: repeat(3,1fr); }
  .ghost-kpi-cell:nth-child(4),
  .ghost-kpi-cell:nth-child(5) { display: none; }
}
</style>
</head>

<script>
(function() {
  function init() {
    var trigger   = document.getElementById('navMonogram');
    var dropdown  = document.getElementById('navDropdown');
    var photoRow  = document.getElementById('navPhotoRow');
    var albumList = document.getElementById('navAlbumList');
    if (!trigger || !dropdown) return;
    function close() {
      trigger.classList.remove('open'); trigger.setAttribute('aria-expanded','false');
      if (albumList) albumList.classList.remove('open');
      if (photoRow)  photoRow.classList.remove('photo-row-active');
    }
    function toggle() { trigger.classList.contains('open') ? close() : (trigger.classList.add('open'), trigger.setAttribute('aria-expanded','true')); }
    if (photoRow && albumList) {
      photoRow.addEventListener('mouseenter', function() { albumList.classList.add('open'); photoRow.classList.add('photo-row-active'); });
      photoRow.addEventListener('mouseleave', function(e) { if (!albumList.contains(e.relatedTarget)) { albumList.classList.remove('open'); photoRow.classList.remove('photo-row-active'); } });
      albumList.addEventListener('mouseleave', function(e) { if (!photoRow.contains(e.relatedTarget)) { albumList.classList.remove('open'); photoRow.classList.remove('photo-row-active'); } });
      photoRow.addEventListener('click', function() { close(); });
    }
    trigger.addEventListener('click', function(e) { e.stopPropagation(); toggle(); });
    trigger.addEventListener('keydown', function(e) { if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}if(e.key==='Escape')close(); });
    document.addEventListener('click', function(e) { if(!trigger.contains(e.target)) close(); });
    document.addEventListener('keydown', function(e) { if(e.key==='Escape') close(); });
    dropdown.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', close); });
  }
  document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', init) : init();
})();
</script>
<script src="../../../transitions.js"></script>
